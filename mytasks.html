<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickGigs — My Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="qg-layout.css">
<link rel="stylesheet" href="qg-role-theme.css">
<script src="qg-brand-init.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0118;--surface:rgba(255,255,255,0.04);--border:rgba(200,168,233,0.1);
  --text:#fff;--text-muted:rgba(255,255,255,0.35);--text-faint:rgba(255,255,255,0.22);
  --purple:#6b3fa0;--purple-light:#9b6fc4;--lavender:#c8a8e9;
  --nav-bg:#0b0118;--tab-bg:#0e021f;--card-bg:rgba(255,255,255,0.04);
}
body.light{
  --bg:#fafafe;--surface:#fff;--border:#f0eeff;--text:#2d1b4e;
  --text-muted:#5a5a72;--text-faint:#9ca3af;--nav-bg:#fff;--tab-bg:#fff;
  --card-bg:#fff;--lavender:#6b3fa0;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;padding-bottom:76px;transition:background 0.25s,color 0.25s;}

.nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);border-bottom:0.5px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;transition:background 0.25s;}
.nav-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;color:var(--lavender);}
.nav-title{font-size:16px;font-weight:500;color:var(--text);}
.mode-btn{padding:6px 13px;border-radius:20px;font-size:11px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}
body.light .mode-btn{background:#f0eeff;color:var(--purple);}

/* TABS */
.tabs-wrap{background:var(--nav-bg);border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;transition:background 0.25s;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{padding:12px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab-btn.active{color:var(--purple-light);border-bottom-color:var(--purple-light);}
body.light .tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);}

/* CONTENT */
.content{padding:16px 20px;}

/* CARDS */
.task-card{border-radius:16px;padding:15px;margin-bottom:10px;border:0.5px solid var(--border);background:var(--card-bg);}
body.light .task-card{box-shadow:0 1px 3px rgba(107,63,160,0.08);}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.tc-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0;}
.tc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tc-cat{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:3px;}
.tc-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.4;}
.tc-badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.badge-open{background:rgba(107,63,160,0.2);color:#9b6fc4;}
body.light .badge-open{background:#ede9ff;color:var(--purple);}
.badge-progress{background:rgba(251,191,36,0.15);color:#d97706;}
.badge-done{background:rgba(74,222,128,0.12);color:#16a34a;}
.tc-meta{font-size:11px;color:var(--text-faint);margin-bottom:10px;}
.tc-bottom{display:flex;align-items:center;justify-content:space-between;}
.tc-price{font-size:15px;font-weight:500;color:var(--text);}
.tc-applicants{font-size:11px;color:var(--purple-light);margin-top:8px;}
body.light .tc-applicants{color:var(--purple);}
.tc-applicants-toggle{width:100%;text-align:left;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--purple-light);font-size:12px;font-weight:500;transition:border-color 0.15s,background 0.15s;}
body.light .tc-applicants-toggle{color:var(--purple);}
.tc-applicants-toggle:hover{border-color:var(--purple-light);}
.tc-applicants-toggle.open{border-color:var(--purple-light);background:rgba(107,63,160,0.12);}
.applicants-panel{display:none;margin-top:8px;padding-top:4px;}
.applicants-panel.open{display:block;}

/* ACTION BUTTONS */
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.act-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:opacity 0.15s;}
.act-btn:hover{opacity:0.85;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-secondary{background:var(--surface);border:0.5px solid var(--border);color:var(--text-muted);}
.btn-success{background:#16a34a;color:#fff;}
.btn-review{background:rgba(251,191,36,0.15);color:#d97706;border:0.5px solid rgba(251,191,36,0.3);}
.btn-danger{background:rgba(239,68,68,0.12);color:#ef4444;border:0.5px solid rgba(239,68,68,0.35);}
.btn-danger:hover{opacity:0.9;}
.decline-btn{padding:6px 12px;border-radius:8px;background:var(--surface);color:var(--text-muted);border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;margin-right:6px;}
.decline-btn:hover:not(:disabled){opacity:0.85;}
.decline-btn:disabled{opacity:0.5;cursor:not-allowed;}
.applicant-actions{display:flex;align-items:center;flex-wrap:wrap;justify-content:flex-end;gap:6px;flex-shrink:0;}
.applicant-row.is-cancelled,.applicant-row.is-withdrawn{opacity:0.4;}
.task-card.is-faded{opacity:0.55;}

/* CONFIRM MODAL */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:400;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border:0.5px solid var(--border);border-radius:18px;padding:22px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.35);}
.confirm-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;}
.confirm-msg{font-size:13px;color:var(--text-muted);line-height:1.55;margin-bottom:18px;}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end;}
.confirm-cancel{padding:10px 18px;border-radius:12px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:inherit;font-size:13px;cursor:pointer;}
.confirm-ok{padding:10px 18px;border-radius:12px;border:none;background:#ef4444;color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;}
.confirm-ok.is-neutral{background:var(--purple);}

/* APPLICANT ROW */
.applicant-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:10px 0;border-top:0.5px solid var(--border);transition:opacity 0.25s,background 0.25s;}
.applicant-row .app-price{margin-left:auto;}
.applicant-row .applicant-actions{width:100%;padding-top:4px;}
.applicant-row.is-faded{opacity:0.35;}
.applicant-row.is-accepted{background:rgba(74,222,128,0.1);border-radius:10px;padding:10px 8px;}
.applicant-row.is-accepting{background:rgba(107,63,160,0.12);border-radius:10px;}
.app-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6b3fa0,#c8a8e9);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;text-decoration:none;}
.app-avatar.has-photo{color:transparent;}
body.light .app-avatar{color:#2d1b4e;}
.app-info{flex:1;min-width:0;}
.app-name{font-size:15px;font-weight:500;color:var(--text);}

body.light .empty-btn,
body.light .btn-primary,
body.light .btn-success,
body.light .accept-btn{color:#2d1b4e;}
.app-msg{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-price{font-size:13px;font-weight:500;color:var(--text);flex-shrink:0;}
.accept-btn{padding:6px 14px;border-radius:8px;background:var(--purple);color:#fff;border:none;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:opacity 0.2s,background 0.2s;}
.accept-btn:hover:not(:disabled){opacity:0.88;}
.accept-btn:disabled{opacity:0.55;cursor:not-allowed;}
.accept-btn.is-done{background:#16a34a;opacity:1;}
.accept-status{font-size:11px;font-weight:500;color:#16a34a;flex-shrink:0;}
.accept-status.declined{color:var(--text-faint);}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.empty-btn{padding:12px 24px;border-radius:13px;background:var(--purple);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#4ade80;color:#0b0118;padding:11px 24px;border-radius:20px;font-size:13px;font-weight:500;display:none;z-index:300;white-space:nowrap;}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--tab-bg);border-top:0.5px solid var(--border);display:flex;padding:8px 0 14px;z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;}
.tab-icon{font-size:22px;color:var(--text-faint);}
.tab-lbl{font-size:10px;color:var(--text-faint);}
.tab-item.active .tab-icon,.tab-item.active .tab-lbl{color:var(--purple-light);}
body.light .tab-item.active .tab-icon,body.light .tab-item.active .tab-lbl{color:var(--purple);}
</style>

<nav class="nav">
  <div class="nav-brand">
    <span class="nav-logo">QuickGigs</span>
    <span class="nav-role">POSTER</span>
  </div>
  <div class="nav-title">My Tasks</div>

var navActive = (typeof isWorkerMode === 'function' && isWorkerMode()) ? 'jobs' : 'tasks';
renderQuickGigsTabBar(navActive);

<script>
var activeTab = 'posted';
var allTasks = [], allApplications = [];
var userNames = {};
var userAvatars = {};
var expandedApplicantTasks = {};
var isDark = localStorage.getItem('qg-mode') !== 'light';
var TAB_IDS = { posted: 'tabPosted', applied: 'tabApplied', inprogress: 'tabInprogress', completed: 'tabCompleted' };

function applyTheme(){ window.QG_applyTheme(isDark, 'modeBtn', false); }
window.toggleTheme = function(){ isDark = !isDark; localStorage.setItem('qg-mode', isDark?'dark':'light'); applyTheme(); };
applyTheme();

function pickDefaultTab() {
  var params = new URLSearchParams(window.location.search);
  var tabParam = params.get('tab');
  if (typeof normalizeMyTasksTab === 'function') {
    activeTab = normalizeMyTasksTab(tabParam || defaultMyTasksTab());
    return;
  }
  if (tabParam && TAB_IDS[tabParam]) {
    activeTab = tabParam;
    return;
  }
  if (typeof isWorkerMode === 'function' && isWorkerMode()) {
    activeTab = 'applied';
    return;
  }
  activeTab = 'posted';
}

function enforceModeTab() {
  if (typeof normalizeMyTasksTab === 'function') {
    activeTab = normalizeMyTasksTab(activeTab);
  } else if (typeof isWorkerMode === 'function' && isWorkerMode() && activeTab === 'posted') {
    activeTab = 'applied';
  } else if (typeof isPosterMode === 'function' && isPosterMode() && activeTab === 'applied') {
    activeTab = 'posted';
  }
}

function syncRoleTabs() {
  var userId = window._currentUser ? window._currentUser.uid : null;
  var hasPosted = userId && allTasks.some(function(t){ return getField(t, 'POSTED_BY') === userId; });
  var hasApps = userId && allApplications.some(function(a){ return getField(a, 'WORKER_ID') === userId; });
  if (typeof applyMyTasksTabsForMode === 'function') {
    applyMyTasksTabsForMode({ hasPosted: hasPosted, hasApps: hasApps });
  }
  enforceModeTab();
}

function syncTabButtons() {
  Object.keys(TAB_IDS).forEach(function(key) {
    var el = document.getElementById(TAB_IDS[key]);
    if (el) el.classList.toggle('active', activeTab === key);
  });
}

function displayName(uid, taskOrApp) {
  if (typeof resolveUserName === 'function') return resolveUserName(uid, taskOrApp, userNames);
  if (taskOrApp && (taskOrApp.worker_name || taskOrApp.WORKER_NAME)) return taskOrApp.worker_name || taskOrApp.WORKER_NAME;
  if (taskOrApp && (taskOrApp.poster_name || taskOrApp.POSTER_NAME)) return taskOrApp.poster_name || taskOrApp.POSTER_NAME;
  if (userNames[uid]) return userNames[uid];
  return 'QuickGigs user';
}

function taskDomId(taskId) {
  return 'apps-' + String(taskId).replace(/[^a-zA-Z0-9_-]/g, '_');
}

function setRowStatus(row, status) {
  if (!row) return;
  row.status = status;
  row.STATUS = status;
}

function applyLocalAcceptState(taskId, appId) {
  taskId = String(taskId);
  appId = String(appId);
  allTasks.forEach(function(t) {
    if (String(getField(t, 'TASK_ID')) === taskId) setRowStatus(t, 'in_progress');
  });
  allApplications.forEach(function(a) {
    if (String(getField(a, 'TASK_ID')) !== taskId) return;
    if (String(getField(a, 'APP_ID')) === appId) setRowStatus(a, 'accepted');
    else if (getField(a, 'STATUS') === 'pending' || !getField(a, 'STATUS')) setRowStatus(a, 'declined');
  });
  if (typeof mergeTaskInCache === 'function') mergeTaskInCache(taskId, { status: 'in_progress', STATUS: 'in_progress' });
  if (typeof mergeApplicationInCache === 'function') {
    allApplications.forEach(function(a) {
      if (String(getField(a, 'TASK_ID')) !== taskId) return;
      var wid = getField(a, 'WORKER_ID');
      var aid = getField(a, 'APP_ID');
      var st = (getField(a, 'STATUS') || 'pending').toLowerCase();
      if (String(aid) === appId) mergeApplicationInCache(aid, taskId, wid, { status: 'accepted', STATUS: 'accepted' });
      else if (st === 'pending') mergeApplicationInCache(aid, taskId, wid, { status: 'declined', STATUS: 'declined' });
    });
  }
}

function isPaymentGatedChat() {
  return !window.QG_CONFIG || window.QG_CONFIG.chatUnlockAfter === 'payment';
}

function renderApplicantAction(a, taskId) {
  var appId = getField(a, 'APP_ID');
  var workerId = getField(a, 'WORKER_ID');
  var status = (getField(a, 'STATUS') || 'pending').toLowerCase();
  if (status === 'accepted') {
    if (isPaymentGatedChat()) {
      return '<span class="accept-status">✓ Accepted · Pay to unlock chat</span>';
    }
    return '<button type="button" class="accept-btn" style="background:var(--surface);color:var(--lavender);border:1px solid var(--border)" onclick="openChatWithWorker('+JSON.stringify(String(taskId))+','+JSON.stringify(String(workerId))+')">💬 Chat</button>' +
      '<span class="accept-status">✓ Accepted</span>';
  }
  if (status === 'declined') return '<span class="accept-status declined">Not selected</span>';
  if (status === 'cancelled') return '<span class="accept-status declined">Withdrawn</span>';
  var chatBtn = isPaymentGatedChat() ? '' :
    '<button type="button" class="accept-btn" style="background:var(--surface);color:var(--lavender);border:1px solid var(--border);margin-right:6px" onclick="openChatWithWorker('+JSON.stringify(String(taskId))+','+JSON.stringify(String(workerId))+')">💬 Chat</button>';
  return '<div class="applicant-actions">' +
    '<button type="button" class="decline-btn" data-decline-task-id="'+escAttr(taskId)+'" data-decline-app-id="'+escAttr(appId)+'">Decline</button>' +
    chatBtn +
    '<button type="button" class="accept-btn" data-task-id="'+escAttr(taskId)+'" data-app-id="'+escAttr(appId)+'">Accept</button>' +
    '</div>';
}

function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;');
}

function setAcceptLoading(acceptBtn, loading) {
  if (!acceptBtn) return;
  var row = acceptBtn.closest('.applicant-row');
  var panel = acceptBtn.closest('.applicants-panel');
  if (loading) {
    acceptBtn.disabled = true;
    acceptBtn.textContent = 'Accepting…';
    if (row) row.classList.add('is-accepting');
    if (panel) {
      panel.querySelectorAll('.applicant-row').forEach(function(other) {
        if (other !== row) other.classList.add('is-faded');
      });
    }
  } else {
    acceptBtn.disabled = false;
    acceptBtn.textContent = 'Accept';
    if (row) row.classList.remove('is-accepting');
  }
}

window.toggleApplicants = function(taskId) {
  taskId = String(taskId);
  expandedApplicantTasks[taskId] = !expandedApplicantTasks[taskId];
  var panel = document.getElementById(taskDomId(taskId));
  var toggles = document.querySelectorAll('.tc-applicants-toggle');
  var btn = null;
  for (var i = 0; i < toggles.length; i++) {
    if (toggles[i].getAttribute('data-applicants-toggle') === taskId) {
      btn = toggles[i];
      break;
    }
  }
  if (panel) panel.classList.toggle('open', !!expandedApplicantTasks[taskId]);
  if (btn) {
    btn.classList.toggle('open', !!expandedApplicantTasks[taskId]);
    var count = btn.getAttribute('data-applicant-count') || '';
    var names = btn.getAttribute('data-applicant-names') || '';
    btn.innerHTML = '👥 ' + count + (names ? ' · ' + names : '') + ' — Tap to ' + (expandedApplicantTasks[taskId] ? 'hide' : 'view');
  }
};

function applyExpandFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var expand = params.get('expand');
  if (expand) {
    expandedApplicantTasks[String(expand)] = true;
    activeTab = 'posted';
    return;
  }
  if (params.get('applicants') === '1') {
    activeTab = 'posted';
    var userId = window._currentUser ? window._currentUser.uid : null;
    if (!userId) return;
    allTasks.forEach(function(t) {
      if (getField(t, 'POSTED_BY') !== userId || getField(t, 'STATUS') !== 'open') return;
      var taskId = String(getField(t, 'TASK_ID'));
      var hasPending = allApplications.some(function(a) {
        return String(getField(a, 'TASK_ID')) === taskId &&
          (getField(a, 'STATUS') || 'pending').toLowerCase() === 'pending';
      });
      if (hasPending) expandedApplicantTasks[taskId] = true;
    });
  }
}

function enrichRowsWithNames() {
  if (!userNames || !Object.keys(userNames).length) return;
  allTasks.forEach(function(t) {
    var pid = getField(t, 'POSTED_BY');
    if (pid && userNames[pid]) {
      if (!getField(t, 'POSTER_NAME') || (typeof isGenericDisplayName === 'function' && isGenericDisplayName(getField(t, 'POSTER_NAME')))) {
        t.poster_name = userNames[pid];
        t.POSTER_NAME = userNames[pid];
      }
    }
  });
  allApplications.forEach(function(a) {
    var wid = getField(a, 'WORKER_ID');
    if (wid && userNames[wid]) {
      if (!getField(a, 'WORKER_NAME') || (typeof isGenericDisplayName === 'function' && isGenericDisplayName(getField(a, 'WORKER_NAME')))) {
        a.worker_name = userNames[wid];
        a.WORKER_NAME = userNames[wid];
      }
    }
  });
}

async function hydrateApplicantAvatars() {
  var uids = {};
  allApplications.forEach(function(a) {
    var wid = getField(a, 'WORKER_ID');
    if (!wid || userAvatars[String(wid)]) return;
    uids[String(wid)] = true;
  });
  var keys = Object.keys(uids);
  if (!keys.length || typeof getUserAvatarUrl !== 'function') return;
  for (var i = 0; i < keys.length; i++) {
    var url = await getUserAvatarUrl(keys[i]);
    if (url) userAvatars[keys[i]] = url;
  }
}

async function hydrateMissingNames() {
  var uids = {};
  allTasks.forEach(function(t) {
    var pid = getField(t, 'POSTED_BY');
    if (pid) uids[String(pid)] = true;
  });
  allApplications.forEach(function(a) {
    var wid = getField(a, 'WORKER_ID');
    if (wid) uids[String(wid)] = true;
  });
  var keys = Object.keys(uids);
  for (var i = 0; i < keys.length; i++) {
    var uid = keys[i];
    if (userNames[uid] && typeof isGenericDisplayName === 'function' && !isGenericDisplayName(userNames[uid])) continue;
    if (typeof getUserNameByFirebaseUid !== 'function') continue;
    var name = await getUserNameByFirebaseUid(uid);
    if (name && !isGenericDisplayName(name)) userNames[uid] = name;
  }
  enrichRowsWithNames();
}

async function loadData(){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if (!userId) return;

  try {
    var cached = typeof readTasksCache === 'function' ? readTasksCache(true) : null;
    if (cached && cached.length) {
      allTasks = cached;
      pickDefaultTab();
      applyExpandFromUrl();
      syncRoleTabs();
      syncTabButtons();
      renderTab();
    }

    var tasksPromise = typeof fetchAllTasksFresh === 'function'
      ? fetchAllTasksFresh()
      : (typeof getAllTasks === 'function' ? getAllTasks() : Promise.resolve([]));
    var appsPromise = typeof fetchAllApplicationsFresh === 'function'
      ? fetchAllApplicationsFresh()
      : (typeof getAllApplications === 'function' ? getAllApplications() : Promise.resolve([]));
    var namesPromise = typeof getUsersNameMap === 'function'
      ? getUsersNameMap().catch(function () { return {}; })
      : Promise.resolve({});
    var avatarsPromise = typeof getUsersAvatarMap === 'function'
      ? getUsersAvatarMap().catch(function () { return {}; })
      : Promise.resolve({});

    var results = await Promise.all([tasksPromise, appsPromise, namesPromise, avatarsPromise]);
    var freshTasks = Array.isArray(results[0]) ? results[0] : [];
    var freshApps = Array.isArray(results[1]) ? results[1] : [];
    if (freshTasks.length || !allTasks.length) allTasks = freshTasks;
    if (freshApps.length || !allApplications.length) allApplications = freshApps;
    userNames = results[2] || {};
    userAvatars = results[3] || {};
    await hydrateApplicantAvatars();
    await hydrateMissingNames();

    if (typeof fetchAllTasksFresh === 'function') { /* already fresh */ }
  } catch (err) {
    console.warn('My Tasks load failed:', err);
    var fallbackTasks = typeof readTasksCache === 'function' ? readTasksCache(true) : null;
    if (fallbackTasks && fallbackTasks.length && !allTasks.length) allTasks = fallbackTasks;
  }

  if (typeof isSupabaseUsingStaleCache === 'function' && isSupabaseUsingStaleCache()) {
    showToast('Showing saved tasks — reconnect or run beta-setup-all.sql if this persists', '#f59e0b');
  }

  pickDefaultTab();
  applyExpandFromUrl();
  syncRoleTabs();
  syncTabButtons();
  renderTab();

  var expandTarget = new URLSearchParams(window.location.search).get('expand');
  if (expandTarget) {
    setTimeout(function () {
      var panel = document.getElementById(taskDomId(expandTarget));
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}
window.loadData = loadData;

function getField(row,f){
  var fieldMap = {
    APP_ID:['APP_ID','app_id','id'],
    TASK_ID:['TASK_ID','task_id','id'],
    TITLE:['TITLE','title'],
    CATEGORY:['CATEGORY','category'],
    TASK_MODE:['TASK_MODE','task_mode'],
    BUDGET:['BUDGET','budget'],
    LOCATION:['LOCATION','location'],
    STATUS:['STATUS','status'],
    CREATED_AT:['CREATED_AT','created_at'],
    POSTED_BY:['POSTED_BY','posted_by'],
    POSTER_NAME:['POSTER_NAME','poster_name'],
    WORKER_ID:['WORKER_ID','worker_id'],
    WORKER_NAME:['WORKER_NAME','worker_name'],
    MESSAGE:['MESSAGE','message'],
    PRICE:['PRICE','price']
  };
  var keys = fieldMap[f] || [f, f.toLowerCase()];
  for(var i = 0; i < keys.length; i++){
    if(row && row[keys[i]] != null) return row[keys[i]];
  }
  return '';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('tabContent').addEventListener('click', function(e) {
  var acceptBtn = e.target.closest('.accept-btn');
  if (acceptBtn && acceptBtn.hasAttribute('data-app-id')) {
    e.preventDefault();
    if (acceptBtn.disabled) return;
    setAcceptLoading(acceptBtn, true);
    acceptApplicant(
      acceptBtn.getAttribute('data-task-id'),
      acceptBtn.getAttribute('data-app-id'),
      acceptBtn
    );
    return;
  }
  var declineBtn = e.target.closest('.decline-btn');
  if (declineBtn) {
    e.preventDefault();
    if (declineBtn.disabled) return;
    declineApplicant(
      declineBtn.getAttribute('data-decline-task-id'),
      declineBtn.getAttribute('data-decline-app-id'),
      declineBtn
    );
    return;
  }
  var toggleBtn = e.target.closest('.tc-applicants-toggle');
  if (toggleBtn) {
    toggleApplicants(toggleBtn.getAttribute('data-applicants-toggle'));

});

window.acceptApplicant = async function(taskId, appId, acceptBtn){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if(!userId) return;

  taskId = String(taskId);
  appId = String(appId);
  if (!appId) {
    setAcceptLoading(acceptBtn, false);
    showToast('Invalid application — refresh and try again', '#ef4444');
    return;
  }

  var task = allTasks.find(function(t){ return String(getField(t,'TASK_ID')) === taskId; });
  var app = allApplications.find(function(a){ return String(getField(a,'APP_ID')) === appId; });
  if(!task || !app){
    setAcceptLoading(acceptBtn, false);
    showToast('Could not find task or application', '#ef4444');
    return;
  }

  var workerId = getField(app, 'WORKER_ID');
  if (String(workerId) === String(userId)) {
    setAcceptLoading(acceptBtn, false);
    showToast('You cannot accept yourself on your own task', '#ef4444');
    return;
  }

  var workerName = displayName(workerId, app);

  var workerUser = await getUserByFirebaseUid(workerId);
  if (workerUser && workerUser.name && typeof isGenericDisplayName === 'function' && !isGenericDisplayName(workerUser.name)) {
    workerName = workerUser.name;
  } else if (typeof getUserNameByFirebaseUid === 'function') {
    var fetchedWorker = await getUserNameByFirebaseUid(workerId);
    if (fetchedWorker) workerName = fetchedWorker;
  }

  var posterName = window._currentUser.displayName || window._currentUser.email.split('@')[0];
  if (typeof formatPersonName === 'function') posterName = formatPersonName(posterName);

  var appStatus = await updateApplicationStatus(appId, 'accepted', {
    taskId: taskId,
    workerId: workerId
  });
  if(!appStatus.success){
    console.error('Accept failed:', appStatus.error);
    setAcceptLoading(acceptBtn, false);
    var acceptMsg = typeof formatSupabaseActionError === 'function'
      ? formatSupabaseActionError('accept', appStatus.error)
      : 'Could not accept — run supabase/tasks-beta-fix.sql in Supabase SQL Editor, then refresh.';
    showToast(acceptMsg, '#ef4444');
    return;
  }

  var taskStatus = await updateTaskStatus(taskId, 'in_progress');
  if(!taskStatus.success) console.warn('Task status update failed:', taskStatus.error);

  if (typeof declinePendingApplicationsForTask === 'function') {
    await declinePendingApplicationsForTask(taskId, appId);
  }

  applyLocalAcceptState(taskId, appId);

  if (acceptBtn) {
    acceptBtn.textContent = '✓ Accepted';
    acceptBtn.classList.add('is-done');
    acceptBtn.disabled = true;
    var row = acceptBtn.closest('.applicant-row');
    if (row) {
      row.classList.remove('is-accepting');
      row.classList.add('is-accepted');
    }
  }

  activeTab = 'inprogress';
  if (window.history && window.history.replaceState) {
    var progUrl = new URL(window.location.href);
    progUrl.searchParams.set('tab', 'inprogress');
    window.history.replaceState({}, '', progUrl.pathname + progUrl.search);
  }
  syncTabButtons();
  renderTab();

  var convResult = await createConversation({
    task_id:       taskId,
    poster_id:     userId,
    worker_id:     workerId,
    poster_name:   posterName,
    worker_name:   workerName,
    task_title:    getField(task, 'TITLE'),
    task_category: getField(task, 'CATEGORY'),
    status:        'in_progress',
    is_unlocked:   !isPaymentGatedChat()
  });

  if(!convResult.success){
    setAcceptLoading(acceptBtn, false);
    showToast('Accepted but chat setup failed — run supabase/messaging.sql', '#f59e0b');
    loadData();
    return;
  }

  if (convResult.data && convResult.data.conv_id && !isPaymentGatedChat()) {
    await unlockConversationIfAllowed(convResult.data.conv_id, convResult.data.status, 'in_progress');
    showToast('Accepted ' + workerName + '! Opening chat…');
    setTimeout(function(){
      window.location.href = 'chat.html?conv=' + encodeURIComponent(convResult.data.conv_id);
    }, 900);
  } else if (isPaymentGatedChat()) {
    showToast('Accepted ' + workerName + '! Complete payment to unlock chat.');
  } else {
    showToast('Accepted ' + workerName + '! Moved to In Progress 💬');
  }
  loadData();
};

function findAcceptedApplication(taskId) {
  return allApplications.find(function(a) {
    return String(getField(a, 'TASK_ID')) === String(taskId) &&
      String(getField(a, 'STATUS') || '').toLowerCase() === 'accepted';
  });
}

window.openChatWithWorker = async function(taskId, workerId){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if(!userId || !taskId || !workerId) {
    showToast('Could not open chat — refresh and try again', '#ef4444');
    return;
  }

  var task = allTasks.find(function(t){ return String(getField(t,'TASK_ID')) === String(taskId); });
  if(!task){
    showToast('Task not found', '#ef4444');
    return;
  }

  var posterId = getField(task, 'POSTED_BY');
  var statusForChat = taskStatus(task);
  var conv = await getConversationForTask(taskId, posterId, workerId);
  if (conv && conv.conv_id) {
    if (!isPaymentGatedChat()) {
      var unlockResult = typeof forceUnlockConversationForTask === 'function'
        ? await forceUnlockConversationForTask(conv, statusForChat)
        : await unlockConversationIfAllowed(conv.conv_id, conv.status, statusForChat);
      if (!unlockResult.success && !unlockResult.skipped) {
        showToast('Chat still locked — run supabase/beta-setup-all.sql in Supabase, then try again.', '#f59e0b');
      }
    }
    window.location.href = 'chat.html?conv=' + encodeURIComponent(conv.conv_id);
    return;
  }

  if (!isPaymentGatedChat() && typeof createConversation === 'function') {
    var workerName = displayName(workerId);
    var posterName = window._currentUser.displayName || window._currentUser.email.split('@')[0];
    if (typeof formatPersonName === 'function') posterName = formatPersonName(posterName);
    var created = await createConversation({
      task_id: taskId,
      poster_id: posterId,
      worker_id: workerId,
      poster_name: posterName,
      worker_name: workerName,
      task_title: getField(task, 'TITLE'),
      task_category: getField(task, 'CATEGORY'),
      status: 'in_progress',
      is_unlocked: true
    });
    if (created.success && created.data && created.data.conv_id) {
      window.location.href = 'chat.html?conv=' + encodeURIComponent(created.data.conv_id);
      return;
    }
  }

  showToast('No chat thread yet — open Messages or run supabase/messaging.sql in Supabase.', '#f59e0b');
  setTimeout(function(){ window.location.href = 'messages.html'; }, 1200);
};

window.openChatForTask = async function(taskId){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if(!userId) return;

  var task = allTasks.find(function(t){ return String(getField(t,'TASK_ID')) === String(taskId); });
  if(!task) {
    showToast('Task not found — refresh and try again', '#ef4444');
    return;
  }

  var posterId = getField(task, 'POSTED_BY');
  if (posterId === userId) {
    var acceptedApp = findAcceptedApplication(taskId);
    if (acceptedApp) {
      await openChatWithWorker(taskId, getField(acceptedApp, 'WORKER_ID'));
      return;
    }
    var pendingApp = allApplications.find(function(a){
      return String(getField(a,'TASK_ID')) === String(taskId);
    });
    if (pendingApp) {
      await openChatWithWorker(taskId, getField(pendingApp, 'WORKER_ID'));
      return;
    }
  } else {
    await openChatWithWorker(taskId, userId);
    return;
  }

  showToast('No chat yet — try Messages or run supabase/messaging.sql', '#f59e0b');
  setTimeout(function(){ window.location.href = 'messages.html'; }, 1200);
};

window.markComplete = async function(taskId){
  taskId = String(taskId);
  var result = await updateTaskStatus(taskId, 'completed');
  if (!result.success) {
    var msg = typeof formatSupabaseActionError === 'function'
      ? formatSupabaseActionError('mark complete', result.error)
      : (result.error || 'Could not mark complete — run supabase/beta-setup-all.sql in Supabase');
    showToast(msg, '#ef4444');
    return;
  }
  allTasks.forEach(function(t) {
    if (String(getField(t, 'TASK_ID')) === taskId) setRowStatus(t, 'completed');
  });
  if (typeof lockConversationsForTask === 'function') {
    await lockConversationsForTask(taskId);
  }
  activeTab = 'completed';
  if (window.history && window.history.replaceState) {
    var doneUrl = new URL(window.location.href);
    doneUrl.searchParams.set('tab', 'completed');
    window.history.replaceState({}, '', doneUrl.pathname + doneUrl.search);
  }
  syncTabButtons();
  renderTab();
  showToast('Task complete! Please leave a review.');
  await loadData();
};

window.declineApplicant = async function(taskId, appId, declineBtn) {
  taskId = String(taskId);
  appId = String(appId);
  if (!appId) {
    showToast('Invalid application — refresh and try again', '#ef4444');
    return;
  }
  var app = allApplications.find(function(a){ return String(getField(a, 'APP_ID')) === appId; });
  var workerId = app ? getField(app, 'WORKER_ID') : '';
  if (declineBtn) {
    declineBtn.disabled = true;
    declineBtn.textContent = 'Declining…';
  }
  var result = await declineApplication(appId, { taskId: taskId, workerId: workerId });
  if (!result.success) {
    if (declineBtn) {
      declineBtn.disabled = false;
      declineBtn.textContent = 'Decline';
    }
    var declineMsg = typeof formatSupabaseActionError === 'function'
      ? formatSupabaseActionError('decline applicant', result.error)
      : 'Could not decline applicant — run supabase/tasks-beta-fix.sql in Supabase, then refresh.';
    showToast(declineMsg, '#ef4444');
    return;
  }
  allApplications.forEach(function(a) {
    if (String(getField(a, 'APP_ID')) === appId ||
        (String(getField(a, 'TASK_ID')) === taskId && String(getField(a, 'WORKER_ID')) === String(workerId))) {
      setRowStatus(a, 'declined');
    }
  });
  showToast('Applicant declined');
  renderTab();
};

window.confirmWithdrawApplication = function(appId) {
  showConfirm({
    title: 'Withdraw application?',
    message: 'Your offer will be removed and the poster will no longer see you as an applicant. You can apply again later if the task is still open.',
    confirmLabel: 'Withdraw',
    onConfirm: async function() {
      var app = allApplications.find(function(a){ return String(getField(a, 'APP_ID')) === String(appId); });
      var taskId = app ? getField(app, 'TASK_ID') : '';
      var workerId = window._currentUser ? window._currentUser.uid : (app ? getField(app, 'WORKER_ID') : '');
      var result = await cancelApplication(String(appId), { taskId: taskId, workerId: workerId });
      if (!result.success) {
        var withdrawMsg = typeof formatSupabaseActionError === 'function'
          ? formatSupabaseActionError('withdraw application', result.error)
          : 'Could not withdraw — run supabase/tasks-beta-fix.sql in Supabase, then refresh.';
        showToast(withdrawMsg, '#ef4444');
        return;
      }
      showToast('Application withdrawn');
      loadData();
    }
  });
};

window.confirmCancelPosting = function(taskId) {
  var task = allTasks.find(function(t) { return String(getField(t, 'TASK_ID')) === String(taskId); });
  var title = task ? getField(task, 'TITLE') : 'this task';
  showConfirm({
    title: 'Cancel posting?',
    message: '“' + title + '” will be removed from browse and all pending applicants will be notified. This cannot be undone.',
    confirmLabel: 'Cancel posting',
    onConfirm: async function() {
      if (typeof invalidateTasksCache === 'function') invalidateTasksCache();
      var result = await cancelTask(String(taskId));
      if (!result.success) {
        showToast(result.error || 'Could not cancel posting — run supabase/tasks-beta-fix.sql', '#ef4444');
        return;
      }
      if (typeof declinePendingApplicationsForTask === 'function') {
        await declinePendingApplicationsForTask(String(taskId));
      }
      showToast('Posting cancelled');
      loadData();
    }
  });
};

window.confirmChangeTasker = function(taskId) {
  var task = allTasks.find(function(t) { return String(getField(t, 'TASK_ID')) === String(taskId); });
  var acceptedApp = findAcceptedApplication(taskId);
  var title = task ? getField(task, 'TITLE') : 'this task';
  var workerName = acceptedApp ? displayName(getField(acceptedApp, 'WORKER_ID'), acceptedApp) : 'this tasker';
  var appId = acceptedApp ? getField(acceptedApp, 'APP_ID') : '';
  if (!appId) {
    showToast('No assigned tasker found — refresh and try again', '#ef4444');
    return;
  }
  showConfirm({
    title: 'Change tasker?',
    message: '“' + title + '” will go back to Open and ' + workerName + ' will be notified they were not selected. You can review and accept another applicant from Posted.',
    confirmLabel: 'Change tasker',
    neutral: true,
    onConfirm: async function() {
      if (typeof invalidateTasksCache === 'function') invalidateTasksCache();
      var result = typeof releaseAcceptedTasker === 'function'
        ? await releaseAcceptedTasker(String(taskId), String(appId))
        : { success: false };
      if (!result.success) {
        showToast(result.error || 'Could not change tasker — try again', '#ef4444');
        return;
      }
      expandedApplicantTasks[String(taskId)] = true;
      activeTab = 'posted';
      syncTabButtons();
      showToast('Task reopened — pick another applicant');
      await loadData();
    }
  });
};

window.confirmCancelInProgress = function(taskId) {
  var task = allTasks.find(function(t) { return String(getField(t, 'TASK_ID')) === String(taskId); });
  var title = task ? getField(task, 'TITLE') : 'this task';
  showConfirm({
    title: 'Cancel this task?',
    message: '“' + title + '” will be marked cancelled. The assigned worker will see it in their history. Use this if the job is no longer happening.',
    confirmLabel: 'Cancel task',
    onConfirm: async function() {
      if (typeof invalidateTasksCache === 'function') invalidateTasksCache();
      var result = await cancelTask(String(taskId));
      if (!result.success) {
        showToast(result.error || 'Could not cancel task — run supabase/tasks-beta-fix.sql', '#ef4444');
        return;
      }
      showToast('Task cancelled');
      loadData();
    }
  });
};
