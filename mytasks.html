<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickGigs — My Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="qg-layout.css">
<link rel="stylesheet" href="qg-role-theme.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0118;--surface:rgba(255,255,255,0.04);--border:rgba(200,168,233,0.1);
  --text:#fff;--text-muted:rgba(255,255,255,0.35);--text-faint:rgba(255,255,255,0.22);
  --purple:#6b3fa0;--purple-light:#9b6fc4;--lavender:#c8a8e9;
  --nav-bg:#0b0118;--tab-bg:#0e021f;--card-bg:rgba(255,255,255,0.04);
}
body.light{
  --bg:#fafafe;--surface:#fff;--border:#f0eeff;--text:#2d1b4e;
  --text-muted:#5a5a72;--text-faint:#9ca3af;--nav-bg:#fff;--tab-bg:#fff;
  --card-bg:#fff;--lavender:#6b3fa0;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;padding-bottom:76px;transition:background 0.25s,color 0.25s;}

.nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);border-bottom:0.5px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;transition:background 0.25s;}
.nav-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;color:var(--lavender);}
.nav-title{font-size:16px;font-weight:500;color:var(--text);}
.mode-btn{padding:6px 13px;border-radius:20px;font-size:11px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}
body.light .mode-btn{background:#f0eeff;color:var(--purple);}

/* TABS */
.tabs-wrap{background:var(--nav-bg);border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;transition:background 0.25s;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{padding:12px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab-btn.active{color:var(--purple-light);border-bottom-color:var(--purple-light);}
body.light .tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);}

/* CONTENT */
.content{padding:16px 20px;}

/* CARDS */
.task-card{border-radius:16px;padding:15px;margin-bottom:10px;border:0.5px solid var(--border);background:var(--card-bg);}
body.light .task-card{box-shadow:0 1px 3px rgba(107,63,160,0.08);}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.tc-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0;}
.tc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tc-cat{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:3px;}
.tc-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.4;}
.tc-badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.badge-open{background:rgba(107,63,160,0.2);color:#9b6fc4;}
body.light .badge-open{background:#ede9ff;color:var(--purple);}
.badge-progress{background:rgba(251,191,36,0.15);color:#d97706;}
.badge-done{background:rgba(74,222,128,0.12);color:#16a34a;}
.tc-meta{font-size:11px;color:var(--text-faint);margin-bottom:10px;}
.tc-bottom{display:flex;align-items:center;justify-content:space-between;}
.tc-price{font-size:15px;font-weight:500;color:var(--text);}
.tc-applicants{font-size:11px;color:var(--purple-light);margin-top:8px;}
body.light .tc-applicants{color:var(--purple);}
.tc-applicants-toggle{width:100%;text-align:left;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--purple-light);font-size:12px;font-weight:500;transition:border-color 0.15s,background 0.15s;}
body.light .tc-applicants-toggle{color:var(--purple);}
.tc-applicants-toggle:hover{border-color:var(--purple-light);}
.tc-applicants-toggle.open{border-color:var(--purple-light);background:rgba(107,63,160,0.12);}
.applicants-panel{display:none;margin-top:8px;padding-top:4px;}
.applicants-panel.open{display:block;}

/* ACTION BUTTONS */
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.act-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:opacity 0.15s;}
.act-btn:hover{opacity:0.85;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-secondary{background:var(--surface);border:0.5px solid var(--border);color:var(--text-muted);}
.btn-success{background:#16a34a;color:#fff;}
.btn-review{background:rgba(251,191,36,0.15);color:#d97706;border:0.5px solid rgba(251,191,36,0.3);}

/* APPLICANT ROW */
.applicant-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:0.5px solid var(--border);transition:opacity 0.25s,background 0.25s;}
.applicant-row.is-faded{opacity:0.35;}
.applicant-row.is-accepted{background:rgba(74,222,128,0.1);border-radius:10px;padding:10px 8px;}
.applicant-row.is-accepting{background:rgba(107,63,160,0.12);border-radius:10px;}
.app-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6b3fa0,#c8a8e9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;}
body.light .app-avatar{color:#2d1b4e;}
.app-info{flex:1;min-width:0;}
.app-name{font-size:15px;font-weight:500;color:var(--text);}

body.light .empty-btn,
body.light .btn-primary,
body.light .btn-success,
body.light .accept-btn{color:#2d1b4e;}
.app-msg{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-price{font-size:13px;font-weight:500;color:var(--text);flex-shrink:0;}
.accept-btn{padding:6px 14px;border-radius:8px;background:var(--purple);color:#fff;border:none;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:opacity 0.2s,background 0.2s;}
.accept-btn:hover:not(:disabled){opacity:0.88;}
.accept-btn:disabled{opacity:0.55;cursor:not-allowed;}
.accept-btn.is-done{background:#16a34a;opacity:1;}
.accept-status{font-size:11px;font-weight:500;color:#16a34a;flex-shrink:0;}
.accept-status.declined{color:var(--text-faint);}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.empty-btn{padding:12px 24px;border-radius:13px;background:var(--purple);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#4ade80;color:#0b0118;padding:11px 24px;border-radius:20px;font-size:13px;font-weight:500;display:none;z-index:300;white-space:nowrap;}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--tab-bg);border-top:0.5px solid var(--border);display:flex;padding:8px 0 14px;z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;}
.tab-icon{font-size:22px;color:var(--text-faint);}
.tab-lbl{font-size:10px;color:var(--text-faint);}
.tab-item.active .tab-icon,.tab-item.active .tab-lbl{color:var(--purple-light);}
body.light .tab-item.active .tab-icon,body.light .tab-item.active .tab-lbl{color:var(--purple);}
</style>

renderQuickGigsTabBar(navActive);

<script>
var activeTab = 'posted';
var allTasks = [], allApplications = [];
var userNames = {};
var expandedApplicantTasks = {};
var isDark = localStorage.getItem('qg-mode') !== 'light';
var TAB_IDS = { posted: 'tabPosted', applied: 'tabApplied', inprogress: 'tabInprogress', completed: 'tabCompleted' };

function applyTheme(){ window.QG_applyTheme(isDark, 'modeBtn', false); }
window.toggleTheme = function(){ isDark = !isDark; localStorage.setItem('qg-mode', isDark?'dark':'light'); applyTheme(); };
applyTheme();

function pickDefaultTab() {
  var params = new URLSearchParams(window.location.search);
  var tabParam = params.get('tab');
  if (tabParam && TAB_IDS[tabParam]) {
    activeTab = tabParam;
    return;
  }
  if (typeof isWorkerMode === 'function' && isWorkerMode()) {
    activeTab = 'applied';
    return;
  }
  activeTab = 'posted';
}

function syncRoleTabs() {
  var userId = window._currentUser ? window._currentUser.uid : null;
  var hasPosted = userId && allTasks.some(function(t){ return getField(t, 'POSTED_BY') === userId; });
  var hasApps = userId && allApplications.some(function(a){ return getField(a, 'WORKER_ID') === userId; });
  if (typeof applyMyTasksTabsForMode === 'function') {
    applyMyTasksTabsForMode({ hasPosted: hasPosted, hasApps: hasApps });
  }
  if (typeof isWorkerMode === 'function' && isWorkerMode() && activeTab === 'posted' && !hasPosted) {
    activeTab = 'applied';
  }
  if (typeof isPosterMode === 'function' && isPosterMode() && activeTab === 'applied' && !hasApps) {
    activeTab = 'posted';
  }
}

function syncTabButtons() {
  Object.keys(TAB_IDS).forEach(function(key) {
    var el = document.getElementById(TAB_IDS[key]);
    if (el) el.classList.toggle('active', activeTab === key);
  });
}

function displayName(uid, taskOrApp) {
  if (typeof resolveUserName === 'function') return resolveUserName(uid, taskOrApp, userNames);
  if (taskOrApp && (taskOrApp.worker_name || taskOrApp.WORKER_NAME)) return taskOrApp.worker_name || taskOrApp.WORKER_NAME;
  if (taskOrApp && (taskOrApp.poster_name || taskOrApp.POSTER_NAME)) return taskOrApp.poster_name || taskOrApp.POSTER_NAME;
  if (userNames[uid]) return userNames[uid];
  return 'QuickGigs user';
}

function taskDomId(taskId) {
  return 'apps-' + String(taskId).replace(/[^a-zA-Z0-9_-]/g, '_');
}

function setRowStatus(row, status) {
  if (!row) return;
  row.status = status;
  row.STATUS = status;
}

function applyLocalAcceptState(taskId, appId) {
  taskId = String(taskId);
  appId = String(appId);
  allTasks.forEach(function(t) {
    if (String(getField(t, 'TASK_ID')) === taskId) setRowStatus(t, 'in_progress');
  });
  allApplications.forEach(function(a) {
    if (String(getField(a, 'TASK_ID')) !== taskId) return;
    if (String(getField(a, 'APP_ID')) === appId) setRowStatus(a, 'accepted');
    else if (getField(a, 'STATUS') === 'pending' || !getField(a, 'STATUS')) setRowStatus(a, 'declined');
  });
  if (typeof invalidateTasksCache === 'function') invalidateTasksCache();
}

function renderApplicantAction(a, taskId) {
  var appId = getField(a, 'APP_ID');
  var status = (getField(a, 'STATUS') || 'pending').toLowerCase();
  if (status === 'accepted') return '<span class="accept-status">✓ Accepted</span>';
  if (status === 'declined') return '<span class="accept-status declined">Not selected</span>';
  return '<button type="button" class="accept-btn" data-task-id="'+escAttr(taskId)+'" data-app-id="'+escAttr(appId)+'">Accept</button>';
}

function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;');
}

function setAcceptLoading(acceptBtn, loading) {
  if (!acceptBtn) return;
  var row = acceptBtn.closest('.applicant-row');
  var panel = acceptBtn.closest('.applicants-panel');
  if (loading) {
    acceptBtn.disabled = true;
    acceptBtn.textContent = 'Accepting…';
    if (row) row.classList.add('is-accepting');
    if (panel) {
      panel.querySelectorAll('.applicant-row').forEach(function(other) {
        if (other !== row) other.classList.add('is-faded');
      });
    }
  } else {
    acceptBtn.disabled = false;
    acceptBtn.textContent = 'Accept';
    if (row) row.classList.remove('is-accepting');
  }
}

window.toggleApplicants = function(taskId) {
  taskId = String(taskId);
  expandedApplicantTasks[taskId] = !expandedApplicantTasks[taskId];
  var panel = document.getElementById(taskDomId(taskId));
  var toggles = document.querySelectorAll('.tc-applicants-toggle');
  var btn = null;
  for (var i = 0; i < toggles.length; i++) {
    if (toggles[i].getAttribute('data-applicants-toggle') === taskId) {
      btn = toggles[i];
      break;
    }
  }
  if (panel) panel.classList.toggle('open', !!expandedApplicantTasks[taskId]);
  if (btn) {
    btn.classList.toggle('open', !!expandedApplicantTasks[taskId]);
    var count = btn.getAttribute('data-applicant-count') || '';
    var names = btn.getAttribute('data-applicant-names') || '';
    btn.innerHTML = '👥 ' + count + (names ? ' · ' + names : '') + ' — Tap to ' + (expandedApplicantTasks[taskId] ? 'hide' : 'view');
  }
};

function applyExpandFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var expand = params.get('expand');
  if (expand) {
    expandedApplicantTasks[String(expand)] = true;
    activeTab = 'posted';
    return;
  }
  if (params.get('applicants') === '1') {
    activeTab = 'posted';
    var userId = window._currentUser ? window._currentUser.uid : null;
    if (!userId) return;
    allTasks.forEach(function(t) {
      if (getField(t, 'POSTED_BY') !== userId || getField(t, 'STATUS') !== 'open') return;
      var taskId = String(getField(t, 'TASK_ID'));
      var hasPending = allApplications.some(function(a) {
        return String(getField(a, 'TASK_ID')) === taskId &&
          (getField(a, 'STATUS') || 'pending').toLowerCase() === 'pending';
      });
      if (hasPending) expandedApplicantTasks[taskId] = true;
    });
  }
}

async function loadData(){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if (!userId) return;

  try {
    var cached = typeof readTasksCache === 'function' ? readTasksCache() : null;
    if (cached && cached.length) {
      allTasks = cached;
      pickDefaultTab();
      applyExpandFromUrl();
      syncRoleTabs();
      syncTabButtons();
      renderTab();
    }

    var tasksPromise = typeof fetchTasksWithCache === 'function'
      ? fetchTasksWithCache()
      : (typeof getAllTasks === 'function' ? getAllTasks() : Promise.resolve([]));
    var appsPromise = typeof getAllApplications === 'function'
      ? getAllApplications()
      : Promise.resolve([]);
    var namesPromise = typeof getUsersNameMap === 'function'
      ? getUsersNameMap().catch(function () { return {}; })
      : Promise.resolve({});

    var results = await Promise.all([tasksPromise, appsPromise, namesPromise]);
    allTasks = Array.isArray(results[0]) ? results[0] : [];
    allApplications = Array.isArray(results[1]) ? results[1] : [];
    userNames = results[2] || {};

    if (typeof fetchAllTasksFresh === 'function') fetchAllTasksFresh();
  } catch (err) {
    console.warn('My Tasks load failed:', err);
    if (!allTasks.length) allTasks = [];
    if (!allApplications.length) allApplications = [];
  }

  pickDefaultTab();
  applyExpandFromUrl();
  syncRoleTabs();
  syncTabButtons();
  renderTab();

  var expandTarget = new URLSearchParams(window.location.search).get('expand');
  if (expandTarget) {
    setTimeout(function () {
      var panel = document.getElementById(taskDomId(expandTarget));
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}
window.loadData = loadData;

function getDemoTasks(){
  return [
    {TASK_ID:1,TITLE:'Deep clean 2 bedroom apartment',CATEGORY:'home',TASK_MODE:'standard',BUDGET:120,LOCATION:'Calgary, AB',STATUS:'open',POSTED_BY:window._currentUser?window._currentUser.uid:'me'},
    {TASK_ID:2,TITLE:'Grocery run — Superstore NW',CATEGORY:'errands',TASK_MODE:'quick',BUDGET:30,LOCATION:'Calgary, AB',STATUS:'in_progress',POSTED_BY:window._currentUser?window._currentUser.uid:'me'},
    {TASK_ID:3,TITLE:'Math tutor Grade 10',CATEGORY:'tutoring',TASK_MODE:'recurring',BUDGET:35,LOCATION:'Calgary, AB',STATUS:'completed',POSTED_BY:'someone_else'},
  ];
}
function getDemoApps(){
  return [
    {APP_ID:1,TASK_ID:3,WORKER_ID:window._currentUser?window._currentUser.uid:'me',MESSAGE:'I can help with math tutoring!',PRICE:35,STATUS:'pending'},
  ];
}

var CAT_ICONS = {home:'🏠',errands:'🚗',tutoring:'🎓',beauty:'💇',moving:'🚚',cooking:'🍳',tech:'💻',care:'👶',gardening:'🌿',events:'🎉',trades:'🔧',other:'📦'};
var CAT_BG    = {home:'rgba(107,63,160,0.2)',errands:'rgba(251,191,36,0.15)',tutoring:'rgba(74,222,128,0.1)',beauty:'rgba(200,168,233,0.15)',moving:'rgba(107,63,160,0.2)',cooking:'rgba(251,191,36,0.12)',tech:'rgba(107,63,160,0.2)',care:'rgba(74,222,128,0.1)',gardening:'rgba(74,222,128,0.08)',events:'rgba(200,168,233,0.15)',trades:'rgba(107,63,160,0.2)',other:'rgba(255,255,255,0.06)'};

function getCat(t){ var k=(t.CATEGORY||t.category||'other').toLowerCase(); return {icon:CAT_ICONS[k]||'📦',bg:CAT_BG[k]||'rgba(255,255,255,0.06)'}; }
function getField(row,f){
  var fieldMap = {
    APP_ID:['APP_ID','app_id','id'],
    TASK_ID:['TASK_ID','task_id','id'],
    TITLE:['TITLE','title'],
    CATEGORY:['CATEGORY','category'],
    TASK_MODE:['TASK_MODE','task_mode'],
    BUDGET:['BUDGET','budget'],
    LOCATION:['LOCATION','location'],
    STATUS:['STATUS','status'],
    POSTED_BY:['POSTED_BY','posted_by'],
    POSTER_NAME:['POSTER_NAME','poster_name'],
    WORKER_ID:['WORKER_ID','worker_id'],
    WORKER_NAME:['WORKER_NAME','worker_name'],
    MESSAGE:['MESSAGE','message'],
    PRICE:['PRICE','price']
  };
  var keys = fieldMap[f] || [f, f.toLowerCase()];
  for(var i = 0; i < keys.length; i++){
    if(row && row[keys[i]] != null) return row[keys[i]];
  }
  return '';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('tabContent').addEventListener('click', function(e) {
  var acceptBtn = e.target.closest('.accept-btn');
  if (acceptBtn) {
    e.preventDefault();
    if (acceptBtn.disabled) return;
    setAcceptLoading(acceptBtn, true);
    acceptApplicant(
      acceptBtn.getAttribute('data-task-id'),
      acceptBtn.getAttribute('data-app-id'),
      acceptBtn
    );
    return;
  }
  var toggleBtn = e.target.closest('.tc-applicants-toggle');
  if (toggleBtn) {
    toggleApplicants(toggleBtn.getAttribute('data-applicants-toggle'));
  }
});

function showToast(msg, color){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#4ade80';
  t.style.color = color ? '#fff' : '#0b0118';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 3000);
}

window.showTab = function(tab, btn){
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  else syncTabButtons();
  if (window.history && window.history.replaceState) {
    var url = new URL(window.location.href);
    url.searchParams.set('tab', tab);
    window.history.replaceState({}, '', url.pathname + url.search);
  }
  renderTab();
};

function renderTab(){
  var userId = window._currentUser ? window._currentUser.uid : null;
  var content = document.getElementById('tabContent');

  if(activeTab === 'posted'){
    var myTasks = allTasks.filter(function(t){ return getField(t,'POSTED_BY') === userId && getField(t,'STATUS') === 'open'; });
    if(!myTasks.length){
      var userId = window._currentUser ? window._currentUser.uid : null;
      var hasApps = allApplications.some(function(a){ return getField(a,'WORKER_ID') === userId; });
      if (hasApps) {
        content.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No open tasks posted</div><div class="empty-sub">You haven\'t posted any open tasks. Check the <strong>Applied</strong> tab for tasks you\'ve applied to.</div><button class="empty-btn" onclick="showTab(\'applied\',document.getElementById(\'tabApplied\'))">View applications</button></div>';
        return;
      }
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No open tasks posted</div><div class="empty-sub">Tasks you post appear here. Workers in your area can apply.</div><a class="empty-btn" href="posttask.html">Post a task</a></div>';
      return;
    }
    content.innerHTML = myTasks.map(function(t){
      var cat = getCat(t);
      var taskId = getField(t,'TASK_ID');
      var apps = allApplications.filter(function(a){ return String(getField(a,'TASK_ID')) === String(taskId); });
      var pendingApps = apps.filter(function(a){ var s = (getField(a,'STATUS') || 'pending').toLowerCase(); return s === 'pending'; });
      var hasAccepted = apps.some(function(a){ return (getField(a,'STATUS') || '').toLowerCase() === 'accepted'; });
      var listApps = hasAccepted ? apps : pendingApps;
      var isOpen = !!expandedApplicantTasks[String(taskId)] || hasAccepted;
      var namePreview = pendingApps.slice(0, 3).map(function(a){
        return displayName(getField(a,'WORKER_ID'), a);
      }).join(', ');
      var appHtml = listApps.length ? listApps.map(function(a){
        var workerId = getField(a,'WORKER_ID');
        var workerName = displayName(workerId, a);
        var status = (getField(a,'STATUS') || 'pending').toLowerCase();
        var rowClass = 'applicant-row';
        if (status === 'accepted') rowClass += ' is-accepted';
        else if (status === 'declined') rowClass += ' is-faded';
        return '<div class="'+rowClass+'">'+
          '<div class="app-avatar">'+esc(workerName.charAt(0).toUpperCase())+'</div>'+
          '<div class="app-info"><div class="app-name">'+esc(workerName)+'</div><div class="app-msg">'+esc(getField(a,'MESSAGE'))+'</div></div>'+
          '<div class="app-price">$'+getField(a,'PRICE')+'</div>'+
          renderApplicantAction(a, taskId)+
        '</div>';
      }).join('') : '<div style="font-size:12px;color:var(--text-faint);padding:10px 0">No pending applicants</div>';
      var toggleLabel = pendingApps.length
        ? pendingApps.length + ' applicant' + (pendingApps.length !== 1 ? 's' : '') + (namePreview ? ' · ' + namePreview + (pendingApps.length > 3 ? '…' : '') : '') + ' — Tap to ' + (isOpen ? 'hide' : 'view')
        : (hasAccepted ? 'Worker accepted — Tap to view' : 'No applicants yet');
      return '<div class="task-card">'+
        '<div class="tc-top"><div class="tc-left"><div class="tc-icon" style="background:'+cat.bg+'">'+cat.icon+'</div><div><div class="tc-cat">'+esc(getField(t,'CATEGORY'))+'</div><div class="tc-title">'+esc(getField(t,'TITLE'))+'</div></div></div><span class="tc-badge badge-open">Open</span></div>'+
        '<div class="tc-meta">📍 '+esc(getField(t,'LOCATION'))+' · $'+getField(t,'BUDGET')+' budget</div>'+
        '<button type="button" class="tc-applicants-toggle'+(isOpen?' open':'')+'" data-applicants-toggle="'+escAttr(taskId)+'" data-applicant-count="'+escAttr(pendingApps.length + ' applicant' + (pendingApps.length !== 1 ? 's' : ''))+'" data-applicant-names="'+escAttr(namePreview + (pendingApps.length > 3 ? '…' : ''))+'">👥 '+esc(toggleLabel)+'</button>'+
        '<div class="applicants-panel'+(isOpen?' open':'')+'" id="'+taskDomId(taskId)+'">'+appHtml+'</div>'+
      '</div>';
    }).join('');
  }

  else if(activeTab === 'applied'){
    var myApps = allApplications.filter(function(a){ return getField(a,'WORKER_ID') === userId; });
    if(!myApps.length){
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">📨</div><div class="empty-title">No applications yet</div><div class="empty-sub">Browse tasks near you and apply to start earning.</div><a class="empty-btn" href="browsetask.html">Browse tasks</a></div>';
      return;
    }
    content.innerHTML = myApps.map(function(a){
      var task = allTasks.find(function(t){ return getField(t,'TASK_ID') == getField(a,'TASK_ID'); }) || {};
      var cat = getCat(task);
      var posterId = getField(task, 'POSTED_BY');
      var posterName = displayName(posterId, task);
      var statusLabel = getField(a,'STATUS') === 'accepted' ? '<span class="tc-badge badge-done">✓ Accepted</span>' : '<span class="tc-badge badge-open">Pending</span>';
      var taskIdStr = JSON.stringify(String(getField(a,'TASK_ID')));
      var msgBtn = getField(a,'STATUS') === 'accepted' ? '<div class="action-row"><button class="act-btn btn-secondary" onclick="openChatForTask('+taskIdStr+')">💬 Message poster</button></div>' : '';
      return '<div class="task-card">'+
        '<div class="tc-top"><div class="tc-left"><div class="tc-icon" style="background:'+cat.bg+'">'+cat.icon+'</div><div><div class="tc-cat">Applied · Posted by '+esc(posterName)+'</div><div class="tc-title">'+esc(getField(task,'TITLE')||'Task #'+getField(a,'TASK_ID'))+'</div></div></div>'+statusLabel+'</div>'+
        '<div class="tc-meta">Your offer: $'+getField(a,'PRICE')+' · '+esc(getField(a,'MESSAGE')).substring(0,60)+'...</div>'+
        msgBtn+
      '</div>';
    }).join('');
  }

  else if(activeTab === 'inprogress'){
    var inProg = allTasks.filter(function(t){ return (getField(t,'POSTED_BY')===userId || allApplications.some(function(a){ return getField(a,'TASK_ID')==getField(t,'TASK_ID')&&getField(a,'WORKER_ID')===userId&&getField(a,'STATUS')==='accepted'; })) && getField(t,'STATUS')==='in_progress'; });
    if(!inProg.length){
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Nothing in progress</div><div class="empty-sub">Tasks move here once you accept a worker (beta — no payment required yet).</div></div>';
      return;
    }
    content.innerHTML = inProg.map(function(t){
      var cat = getCat(t);
      var userId = window._currentUser ? window._currentUser.uid : null;
      var isPoster = getField(t,'POSTED_BY') === userId;
      var taskId = getField(t,'TASK_ID');
      var acceptedApp = allApplications.find(function(a){
        return String(getField(a,'TASK_ID')) === String(taskId) && getField(a,'STATUS') === 'accepted';
      });
      var workerName = acceptedApp ? displayName(getField(acceptedApp,'WORKER_ID'), acceptedApp) : '';
      var roleLabel = isPoster
        ? (workerName ? 'Worker: ' + esc(workerName) : 'You posted')
        : 'Posted by '+esc(displayName(getField(t,'POSTED_BY'), t));
      return '<div class="task-card">'+
        '<div class="tc-top"><div class="tc-left"><div class="tc-icon" style="background:'+cat.bg+'">'+cat.icon+'</div><div><div class="tc-cat">'+roleLabel+'</div><div class="tc-title">'+esc(getField(t,'TITLE'))+'</div></div></div><span class="tc-badge badge-progress">⏳ In progress</span></div>'+
        '<div class="tc-meta">📍 '+esc(getField(t,'LOCATION'))+' · $'+getField(t,'BUDGET')+'</div>'+
        '<div class="action-row"><button class="act-btn btn-success" onclick="markComplete('+JSON.stringify(String(taskId))+')">✓ Mark complete</button><button class="act-btn btn-secondary" onclick="openChatForTask('+JSON.stringify(String(taskId))+')">💬 Message</button></div>'+
      '</div>';
    }).join('');
  }

  else if(activeTab === 'completed'){
    var done = allTasks.filter(function(t){ return getField(t,'STATUS')==='completed' && (getField(t,'POSTED_BY')===userId || allApplications.some(function(a){ return getField(a,'TASK_ID')==getField(t,'TASK_ID')&&getField(a,'WORKER_ID')===userId; })); });
    if(!done.length){
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No completed tasks yet</div><div class="empty-sub">Completed tasks will appear here once both sides confirm the work is done.</div></div>';
      return;
    }
    content.innerHTML = done.map(function(t){
      var cat = getCat(t);
      return '<div class="task-card">'+
        '<div class="tc-top"><div class="tc-left"><div class="tc-icon" style="background:'+cat.bg+'">'+cat.icon+'</div><div><div class="tc-cat">'+esc(getField(t,'CATEGORY'))+'</div><div class="tc-title">'+esc(getField(t,'TITLE'))+'</div></div></div><span class="tc-badge badge-done">✓ Done</span></div>'+
        '<div class="tc-meta">📍 '+esc(getField(t,'LOCATION'))+' · $'+getField(t,'BUDGET')+'</div>'+
        '<div class="action-row"><a class="act-btn btn-review" href="review.html?task='+esc(getField(t,'TITLE'))+'&price='+getField(t,'BUDGET')+'">⭐ Leave review</a></div>'+
      '</div>';
    }).join('');
  }
}

window.acceptApplicant = async function(taskId, appId, acceptBtn){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if(!userId) return;

  taskId = String(taskId);
  appId = String(appId);
  if (!appId) {
    setAcceptLoading(acceptBtn, false);
    showToast('Invalid application — refresh and try again', '#ef4444');
    return;
  }

  var task = allTasks.find(function(t){ return String(getField(t,'TASK_ID')) === taskId; });
  var app = allApplications.find(function(a){ return String(getField(a,'APP_ID')) === appId; });
  if(!task || !app){
    setAcceptLoading(acceptBtn, false);
    showToast('Could not find task or application', '#ef4444');
    return;
  }

  var workerId = getField(app, 'WORKER_ID');
  var workerName = displayName(workerId, app);

  var appStatus = await updateApplicationStatus(appId, 'accepted');
  if(!appStatus.success){
    console.error('Accept failed:', appStatus.error);
    setAcceptLoading(acceptBtn, false);
    showToast('Could not accept — run supabase/tasks-beta-fix.sql in Supabase', '#ef4444');
    return;
  }

  var taskStatus = await updateTaskStatus(taskId, 'in_progress');
  if(!taskStatus.success) console.warn('Task status update failed:', taskStatus.error);

  applyLocalAcceptState(taskId, appId);

  if (acceptBtn) {
    acceptBtn.textContent = '✓ Accepted';
    acceptBtn.classList.add('is-done');
    acceptBtn.disabled = true;
    var row = acceptBtn.closest('.applicant-row');
    if (row) {
      row.classList.remove('is-accepting');
      row.classList.add('is-accepted');
    }
  }

  activeTab = 'inprogress';
  syncTabButtons();
  renderTab();

  var workerUser = await getUserByFirebaseUid(workerId);
  if (workerUser && workerUser.name) workerName = workerUser.name;
  var posterName = window._currentUser.displayName || window._currentUser.email.split('@')[0];

  var convResult = await createConversation({
    task_id:       taskId,
    poster_id:     userId,
    worker_id:     workerId,
    poster_name:   posterName,
    worker_name:   workerName,
    task_title:    getField(task, 'TITLE'),
    task_category: getField(task, 'CATEGORY'),
    is_unlocked:   true
  });

  if(!convResult.success){
    showToast('Accepted ' + workerName + '! Chat setup pending.', '#f59e0b');
  } else {
    showToast('Accepted ' + workerName + '! Moved to In Progress 💬');
  }
  loadData();
};

window.openChatForTask = async function(taskId){
  var userId = window._currentUser ? window._currentUser.uid : null;
  if(!userId) return;

  var task = allTasks.find(function(t){ return String(getField(t,'TASK_ID')) === String(taskId); });
  if(!task) return;

  var posterId = getField(task, 'POSTED_BY');
  var acceptedApp = allApplications.find(function(a){
    return String(getField(a,'TASK_ID')) === String(taskId) && getField(a,'STATUS') === 'accepted';
  });
  if(!acceptedApp){
    window.location.href = 'messages.html';
    return;
  }

  var workerId = getField(acceptedApp, 'WORKER_ID');
  var conv = await getConversationForTask(taskId, posterId, workerId);
  if(conv && conv.conv_id){
    window.location.href = 'chat.html?conv=' + encodeURIComponent(conv.conv_id);
  } else {
    window.location.href = 'messages.html';
  }
};

window.markComplete = async function(taskId){
  var result = await updateTaskStatus(taskId, 'completed');
  if (!result.success) {
    showToast('Could not mark complete. Try again.', '#ef4444');
    return;
  }
  showToast('Task marked complete! Leave a review when ready.');
  loadData();
};
</script>
