(function () {
  var p = new URLSearchParams(window.location.search);
  var m = p.get('mode') || localStorage.getItem('qg-session-mode') || localStorage.getItem('qg-role') || 'poster';
  document.documentElement.setAttribute('data-qg-mode', m === 'worker' ? 'worker' : 'poster');
})();

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0118;
  --surface:rgba(255,255,255,0.04);
  --surface-hover:rgba(107,63,160,0.1);
  --border:rgba(200,168,233,0.1);
  --border-hover:#9b6fc4;
  --text:#fff;
  --text-muted:rgba(255,255,255,0.35);
  --text-faint:rgba(255,255,255,0.22);
  --purple:#6b3fa0;
  --purple-light:#9b6fc4;
  --lavender:#c8a8e9;
  --nav-bg:#0b0118;
  --tab-bg:#0e021f;
  --card-bg:rgba(255,255,255,0.04);
  --input-bg:rgba(255,255,255,0.06);
  --green:#4ade80;
}
body.light{
  --bg:#fafafe;
  --surface:#fff;
  --surface-hover:#f5f2ff;
  --border:#f0eeff;
  --border-hover:#9b6fc4;
  --text:#2d1b4e;
  --text-muted:#5a5a72;
  --text-faint:#9ca3af;
  --nav-bg:#fff;
  --tab-bg:#fff;
  --card-bg:#fff;
  --input-bg:#f0eeff;
  --green:#16a34a;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;padding-bottom:76px;transition:background 0.25s,color 0.25s;}

/* NAV */
.nav{position:relative;position:sticky;top:0;z-index:50;background:var(--nav-bg);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;transition:background 0.25s;}
.nav-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;color:var(--lavender);}
body.light .nav-logo{color:var(--purple);}
.nav-right{display:flex;align-items:center;gap:10px;}
.switch-btn{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;white-space:nowrap;}
.switch-btn:hover{border-color:var(--purple-light);color:var(--purple-light);}
.mode-switcher{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.mode-switch-opt{border-radius:14px;padding:12px 10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:all 0.2s;color:var(--text);}
.mode-switch-opt:hover{border-color:var(--purple-light);}
.mode-switch-opt.active{border-color:var(--purple-light);background:rgba(107,63,160,0.18);box-shadow:0 0 0 1px rgba(155,111,196,0.25);}
body.light .mode-switch-opt.active{background:#ede9ff;}
.mode-switch-opt.active-worker{border-color:#16a34a;background:rgba(74,222,128,0.12);box-shadow:0 0 0 1px rgba(74,222,128,0.2);}
body.light .mode-switch-opt.active-worker{background:#ecfdf5;}
.mode-switch-icon{font-size:20px;display:block;margin-bottom:4px;}
.mode-switch-label{font-size:13px;font-weight:500;display:block;color:var(--text);}
.mode-switch-desc{font-size:10px;color:var(--text-muted);display:block;margin-top:2px;}
.mode-switch-note{font-size:11px;color:var(--text-faint);margin-top:10px;line-height:1.5;}
.stat-card-link{text-decoration:none;color:inherit;display:block;cursor:pointer;}
.stat-card-link:hover{transform:translateY(-1px);border-color:var(--border-hover);}
.mode-btn{padding:6px 13px;border-radius:20px;font-size:11px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);transition:all 0.2s;}
body.light .mode-btn{background:#f0eeff;color:var(--purple);}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6b3fa0,#c8a8e9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;}
body.light .avatar{color:#2d1b4e;}

/* GREETING */
.greeting{padding:20px 20px 16px;background:var(--nav-bg);transition:background 0.25s;}
.mode-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.tag-poster{background:rgba(107,63,160,0.25);color:var(--lavender);}
body.light .tag-poster{background:#ede9ff;color:var(--purple);}
.tag-worker{background:rgba(74,222,128,0.12);color:#16a34a;}
.greet-name{font-size:1.5rem;font-weight:500;color:var(--text);margin-bottom:3px;}
.greet-sub{font-size:13px;color:var(--text-muted);}

/* STAT CARDS */
.stats{padding:16px 20px;gap:10px;}
.stat-card{border-radius:16px;padding:14px 15px;border:0.5px solid var(--border);background:var(--card-bg);transition:all 0.2s;}
.light .stat-card{box-shadow:0 1px 3px rgba(107,63,160,0.08);}
.stat-card:hover{border-color:var(--border-hover);}
.stat-icon{font-size:20px;margin-bottom:8px;}
.stat-val{font-size:22px;font-weight:500;color:var(--text);margin-bottom:3px;}
.stat-val.green{color:var(--green);}
.stat-val.purple{color:var(--lavender);}
body.light .stat-val.purple{color:var(--purple);}
.stat-lbl{font-size:11px;color:var(--text-faint);}

/* ACTION CARDS */
.actions{padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.actions .action-card[style*="grid-column"]{margin-top:0;}
.action-card{border-radius:16px;padding:16px 15px;cursor:pointer;text-decoration:none;display:block;transition:all 0.2s;}
.light .action-card{box-shadow:0 1px 3px rgba(107,63,160,0.08);}
.action-card:hover{transform:translateY(-1px);}
.action-card.primary{background:linear-gradient(135deg,#6b3fa0,#9b6fc4);}
.action-card.secondary{background:var(--card-bg);border:0.5px solid var(--border);}
.action-card.secondary:hover{border-color:var(--border-hover);background:var(--surface-hover);}
.action-icon{font-size:22px;margin-bottom:8px;}
.action-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.action-card.primary .action-title{color:#fff;}
.action-card.secondary .action-title{color:var(--text);}
.action-desc{font-size:11px;}
.action-card.primary .action-desc{color:rgba(255,255,255,0.65);}
.action-card.secondary .action-desc{color:var(--text-muted);}

/* SECTION */
.section{padding:0 20px 20px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:15px;font-weight:500;color:var(--text);}
.see-all{font-size:12px;color:var(--purple-light);text-decoration:none;}
.see-all:hover{text-decoration:underline;}

/* TASK ROWS */
.task-row{display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer;transition:opacity 0.15s;}
.task-row:hover{opacity:0.8;}
.task-row+.task-row{border-top:0.5px solid var(--border);}
.task-dot{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.task-info{flex:1;min-width:0;}
.task-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

body.light .action-card.primary .action-title,
body.light .empty-btn{color:#2d1b4e;}
.task-meta{font-size:11px;color:var(--text-faint);}
.task-right{text-align:right;flex-shrink:0;}
.task-price{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;}
.task-badge{font-size:9px;padding:2px 8px;border-radius:20px;display:inline-block;}
.badge-quick{background:rgba(251,191,36,0.15);color:#d97706;}
.badge-standard{background:rgba(107,63,160,0.2);color:var(--lavender);}
body.light .badge-standard{background:#ede9ff;color:var(--purple);}
.badge-recurring{background:rgba(74,222,128,0.1);color:#16a34a;}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 0;border:0.5px dashed var(--border);border-radius:16px;}
.empty-icon{font-size:32px;margin-bottom:10px;}
.empty-txt{font-size:13px;color:var(--text-muted);margin-bottom:12px;}
.empty-btn{padding:9px 20px;border-radius:12px;background:var(--purple);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--tab-bg);border-top:0.5px solid var(--border);display:flex;padding:8px 0 14px;z-index:100;transition:background 0.25s;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;}
.tab-icon{font-size:22px;color:var(--text-faint);transition:color 0.15s;}
.tab-lbl{font-size:10px;color:var(--text-faint);transition:color 0.15s;}
.tab-item.active .tab-icon,.tab-item.active .tab-lbl{color:var(--purple-light);}
body.light .tab-item.active .tab-icon,body.light .tab-item.active .tab-lbl{color:var(--purple);}
.legal-footer{text-align:center;padding:20px;font-size:11px;color:var(--text-faint);}
.legal-footer a{color:var(--purple-light);text-decoration:none;}
.legal-footer a:hover{text-decoration:underline;}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbYJxU-3r7qVMqwzXHiC-qRkZNtmGobm0",
  authDomain: "quickgigs-7b12d.firebaseapp.com",
  projectId: "quickgigs-7b12d",
  storageBucket: "quickgigs-7b12d.firebasestorage.app",
  messagingSenderId: "698985399366",
  appId: "1:698985399366:web:8a3ca60c5f3ffac84bb647"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.doLogout = function() {
  signOut(auth)
    .then(function(){ window.location.href = 'login.html'; })
    .catch(function(){ window.location.href = 'login.html'; });
};

let authChecked = false;
const redirectTimeout = setTimeout(() => {
  if (!authChecked) window.location.href = 'login.html';
}, 3000);

onAuthStateChanged(auth, (user) => {
  authChecked = true;
  clearTimeout(redirectTimeout);
  if (!user) { window.location.href = 'login.html'; return; }
  const name = user.displayName || user.email.split('@')[0];
  const firstName = name.split(' ')[0];
  window._userName = firstName;
  document.getElementById('avatarEl').textContent = firstName.charAt(0).toUpperCase();
  loadDashboardData(user.uid);
});
</script>

<script src="supabase-db.js"></script>
<script src="qg-location.js"></script>
<script>
// ── THEME ──────────────────────────────────────────────
var isDark = localStorage.getItem('qg-mode') !== 'light';
function applyTheme(){
  window.QG_applyTheme(isDark, 'modeBtn', false);
}
window.toggleTheme = function(){
  isDark = !isDark;
  localStorage.setItem('qg-mode', isDark ? 'dark' : 'light');
  applyTheme();
};
applyTheme();

// ── MODE (poster / worker) ─────────────────────────────
var params = new URLSearchParams(window.location.search);
var sessionMode = params.get('mode') || localStorage.getItem('qg-session-mode') || localStorage.getItem('qg-role') || 'poster';
if (typeof setSessionMode === 'function') sessionMode = setSessionMode(sessionMode);
else {
  sessionMode = sessionMode === 'worker' ? 'worker' : 'poster';
  localStorage.setItem('qg-session-mode', sessionMode);
}
var isPoster = sessionMode === 'poster';
var dashData = { posted: [], apps: [], userId: null };

window.switchMode = function(){
  if (typeof switchRoleMode === 'function') switchRoleMode();
  else window.location.href = 'dashboard.html?mode=' + (isPoster ? 'worker' : 'poster');
};

window.setDashboardMode = function(mode) {
  mode = mode === 'worker' ? 'worker' : 'poster';
  var current = isPoster ? 'poster' : 'worker';
  if (mode === current) return;
  if (typeof setSessionMode === 'function') setSessionMode(mode);
  window.location.href = 'dashboard.html?mode=' + mode;
};

function updateModeSwitcherUI() {
  document.querySelectorAll('.mode-switch-opt').forEach(function(btn) {
    var isPosterBtn = btn.getAttribute('data-mode') === 'poster';
    var active = isPosterBtn ? isPoster : !isPoster;
    btn.classList.toggle('active', isPosterBtn && active);
    btn.classList.toggle('active-worker', !isPosterBtn && active);
  });
}

function taskField(row, key) {
  var map = {
    id: ['task_id', 'TASK_ID', 'id'],
    title: ['title', 'TITLE'],
    status: ['status', 'STATUS'],
    budget: ['budget', 'BUDGET'],
    posted_by: ['posted_by', 'POSTED_BY'],
    mode: ['task_mode', 'TASK_MODE'],
    category: ['category', 'CATEGORY']
  };
  var keys = map[key] || [key];
  for (var i = 0; i < keys.length; i++) {
    if (row && row[keys[i]] != null) return row[keys[i]];
  }
  return '';
}

function appField(row, key) {
  var map = {
    id: ['app_id', 'APP_ID', 'id'],
    task_id: ['task_id', 'TASK_ID'],
    worker_id: ['worker_id', 'WORKER_ID'],
    status: ['status', 'STATUS']
  };
  var keys = map[key] || [key];
  for (var i = 0; i < keys.length; i++) {
    if (row && row[keys[i]] != null) return row[keys[i]];
  }
  return '';
}

function getTimeGreeting(){
  var h = new Date().getHours();
  if(h < 12) return 'Good morning';
  if(h < 17) return 'Good afternoon';
  return 'Good evening';
}

function renderGreeting(){
  var name = window._userName || '';
  var city = window.getUserCityLabel ? window.getUserCityLabel() : 'Calgary';
  document.getElementById('greetName').textContent = getTimeGreeting() + (name ? ', ' + name : '') + ' 👋';
  var sub = isPoster
    ? 'Post tasks and review applicants · ' + city
    : 'Browse gigs and track your applications · ' + city;
  document.getElementById('greetSub').textContent = sub;
}

async function loadDashboardData(userId) {
  dashData.userId = userId;
  var cached = typeof readTasksCache === 'function' ? readTasksCache() : null;
  if (cached && cached.length) {
    dashData.posted = cached;
    renderAll();
  }
  try {
    var headers = window.SUPABASE_HEADERS;
    var res = await Promise.all([
      typeof fetchAllTasksFresh === 'function' ? fetchAllTasksFresh() : fetch(window.SUPABASE_URL + '/rest/v1/tasks?order=created_at.desc&limit=100', { headers: headers }).then(function (r) { return r.ok ? r.json() : []; }),
      fetch(window.SUPABASE_URL + '/rest/v1/applications?order=created_at.desc&limit=200', { headers: headers }).then(function (r) { return r.ok ? r.json() : []; })
    ]);
    dashData.posted = Array.isArray(res[0]) ? res[0] : [];
    dashData.apps = Array.isArray(res[1]) ? res[1] : [];
  } catch (err) {
    console.warn('Dashboard stats load failed:', err);
    if (!cached || !cached.length) {
      dashData.posted = [];
      dashData.apps = [];
    }
  }
  renderAll();
}

function updateRoleHeroUI(applicantCount) {
  var badge = document.getElementById('roleBadge');
  var cta = document.getElementById('roleHeroCta');
  var sec = document.getElementById('roleHeroSecondary');
  var statsEl = document.getElementById('statsGrid');
  if (statsEl) statsEl.className = isPoster ? 'stats stats-poster-layout' : 'stats stats-worker-layout';
  document.documentElement.setAttribute('data-qg-mode', isPoster ? 'poster' : 'worker');
  if (typeof applyRoleTheme === 'function') applyRoleTheme();

  if (!badge || !cta) return;
  if (isPoster) {
    badge.textContent = '📋 Hiring hub';
    cta.href = 'posttask.html';
    cta.textContent = '➕ Post a new task';
    if (sec) {
      sec.href = 'mytasks.html?tab=posted&applicants=1';
      sec.textContent = 'Review applicants →';
      sec.style.display = applicantCount > 0 ? 'block' : 'none';
    }
  } else {
    badge.textContent = '💼 Tasker hub';
    cta.href = 'browsetask.html';
    cta.textContent = '🔍 Browse gigs near you';
    if (sec) {
      sec.href = 'mytasks.html?tab=applied';
      sec.textContent = 'View my applications →';
      sec.style.display = 'block';
    }
  }
}

function initDashboardRoleShell() {
  var statsEl = document.getElementById('statsGrid');
  if (statsEl) statsEl.className = isPoster ? 'stats stats-poster-layout' : 'stats stats-worker-layout';
  document.documentElement.setAttribute('data-qg-mode', isPoster ? 'poster' : 'worker');
  if (typeof applyRoleTheme === 'function') applyRoleTheme();
  updateRoleHeroUI(0);
  updateModeSwitcherUI();
  renderGreeting();
}
initDashboardRoleShell();

function renderAll(){
  renderGreeting();
  var userId = dashData.userId;
  var myPosted = userId ? dashData.posted.filter(function(t){ return taskField(t, 'posted_by') === userId; }) : [];
  var myOpenPosted = myPosted.filter(function(t){ return taskField(t, 'status') === 'open'; });
  var myCompleted = myPosted.filter(function(t){ return taskField(t, 'status') === 'completed'; });
  var myApps = userId ? dashData.apps.filter(function(a){ return appField(a, 'worker_id') === userId; }) : [];
  var myAcceptedApps = myApps.filter(function(a){ return appField(a, 'status') === 'accepted'; });
  var applicantCount = userId ? dashData.apps.filter(function(a){
    return myPosted.some(function(t){ return String(taskField(t, 'id')) === String(appField(a, 'task_id')); });
  }).length : 0;
  var totalSpent = myPosted.reduce(function(s, t){ return s + (parseFloat(taskField(t, 'budget')) || 0); }, 0);

  var myInProgressWorker = userId ? dashData.posted.filter(function(t){
    if (taskField(t, 'status') !== 'in_progress') return false;
    return myAcceptedApps.some(function(a){
      return String(appField(a, 'task_id')) === String(taskField(t, 'id'));
    });
  }).length : 0;

  var stats = isPoster
    ? [
        {icon:'📋', val: String(myPosted.length), cls:'', lbl:'Tasks posted', href:'mytasks.html?tab=posted'},
        {icon:'👥', val: String(applicantCount), cls:'purple', lbl:'Applicants', href:'mytasks.html?tab=posted&applicants=1'},
        {icon:'✅', val: String(myCompleted.length), cls:'', lbl:'Completed', href:'mytasks.html?tab=completed'},
        {icon:'💸', val: '$' + totalSpent, cls:'green', lbl:'Total posted', href:'mytasks.html?tab=posted'}
      ]
    : [
        {icon:'📨', val: String(myApps.length), cls:'', lbl:'Applications', href:'mytasks.html?tab=applied'},
        {icon:'✅', val: String(myAcceptedApps.length), cls:'purple', lbl:'Jobs accepted', href:'mytasks.html?tab=applied'},
        {icon:'⏳', val: String(myInProgressWorker), cls:'', lbl:'In progress', href:'mytasks.html?tab=inprogress'},
        {icon:'💰', val: '—', cls:'green', lbl:'Total earned', href:'mytasks.html?tab=applied'}
      ];

  document.getElementById('statsGrid').innerHTML = stats.map(function(s){
    return '<a class="stat-card stat-card-link" href="'+s.href+'">' +
      '<div class="stat-icon">'+s.icon+'</div>' +
      '<div class="stat-val '+s.cls+'">'+s.val+'</div>' +
      '<div class="stat-lbl">'+s.lbl+'</div></a>';
  }).join('');

  updateRoleHeroUI(applicantCount);
  updateModeSwitcherUI();

  var sectionTitle = document.getElementById('sectionTitle');
  var seeAll = document.querySelector('.section-hdr .see-all');
  var city = window.getUserCityLabel ? window.getUserCityLabel() : 'Calgary';
  var html = '';

  if (isPoster) {
    sectionTitle.textContent = 'Your open tasks';
    if (seeAll) { seeAll.href = 'mytasks.html?tab=posted&applicants=1'; seeAll.textContent = 'See all'; }
    if (myOpenPosted.length) {
      html = myOpenPosted.slice(0, 5).map(function(t){
        var appsOnTask = dashData.apps.filter(function(a){
          return String(appField(a, 'task_id')) === String(taskField(t, 'id'));
        }).length;
        var taskId = taskField(t, 'id');
        var taskHref = 'mytasks.html?tab=posted' + (appsOnTask ? '&expand=' + encodeURIComponent(String(taskId)) : '');
        return '<a class="task-row" href="'+taskHref+'" style="text-decoration:none">' +
          '<div class="task-dot" style="background:rgba(107,63,160,0.2)">📋</div>' +
          '<div class="task-info"><div class="task-name">'+String(taskField(t,'title')).replace(/</g,'&lt;')+'</div><div class="task-meta">Open · $'+taskField(t,'budget')+(appsOnTask ? ' · '+appsOnTask+' applicant'+(appsOnTask!==1?'s':'') : '')+'</div></div>' +
          '<div class="task-right"><div class="task-price">Review</div></div>' +
        '</a>';
      }).join('');
    } else {
      html = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">No open tasks yet — post one in under a minute</div><a class="empty-btn" href="posttask.html">Post a task</a></div>';
    }
  } else {
    sectionTitle.textContent = 'Gigs near you';
    if (seeAll) { seeAll.href = 'browsetask.html'; seeAll.textContent = 'See all'; }
    var openNearby = dashData.posted.filter(function(t){
      return taskField(t, 'status') === 'open' && taskField(t, 'posted_by') !== userId;
    }).slice(0, 5);
    if (openNearby.length) {
      html = openNearby.map(function(t){
        var mode = taskField(t, 'mode') || 'standard';
        var badge = mode === 'quick' ? 'badge-quick' : mode === 'recurring' ? 'badge-recurring' : 'badge-standard';
        var badgeLabel = mode === 'quick' ? '⚡ Quick' : mode === 'recurring' ? '🔄 Recurring' : 'Standard';
        return '<a class="task-row" href="browsetask.html" style="text-decoration:none">' +
          '<div class="task-dot" style="background:rgba(74,222,128,0.15)">💼</div>' +
          '<div class="task-info"><div class="task-name">'+String(taskField(t,'title')).replace(/</g,'&lt;')+'</div><div class="task-meta">📍 '+String(taskField(t,'location')||city)+'</div></div>' +
          '<div class="task-right"><div class="task-price">$'+taskField(t,'budget')+'</div><span class="task-badge '+badge+'">'+badgeLabel+'</span></div>' +
        '</a>';
      }).join('');
    } else {
      html = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">No gigs posted nearby yet — check back soon</div><a class="empty-btn" href="browsetask.html">Browse all tasks</a></div>';
    }
    if (myPosted.length) {
      html += '<div style="margin-top:16px"></div><div class="section-hdr"><span class="section-title">Tasks you posted</span><a class="see-all" href="mytasks.html?tab=posted">See all</a></div>';
      html += myOpenPosted.slice(0, 2).map(function(t){
        return '<a class="task-row" href="mytasks.html?tab=posted" style="text-decoration:none">' +
          '<div class="task-dot" style="background:rgba(107,63,160,0.2)">📋</div>' +
          '<div class="task-info"><div class="task-name">'+String(taskField(t,'title')).replace(/</g,'&lt;')+'</div><div class="task-meta">You posted · $'+taskField(t,'budget')+'</div></div></a>';
      }).join('');
    }
  }

  document.getElementById('tasksList').innerHTML = html;
}

initUserLocation().then(function(){ renderGreeting(); });

window.toggleAvatarMenu = function() {
  var menu = document.getElementById('avatarMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
};
document.addEventListener('click', function(e) {
  if (!e.target.closest('#avatarEl') && !e.target.closest('#avatarMenu')) {
    var menu = document.getElementById('avatarMenu');
    if (menu) menu.style.display = 'none';
  }
});
</script>
</body>
</html>
