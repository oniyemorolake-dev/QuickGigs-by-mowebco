<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickGigs — Log In · Canada</title>
<meta name="description" content="Log in to QuickGigs — Canada's marketplace for everyday tasks and gigs, available nationwide.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p1:#0d0520;--a:#9b6fc4;--al:#c8a8e9;--w:#ffffff;--wm:rgba(255,255,255,0.7);--ws:rgba(255,255,255,0.4);--err:#ff6b6b;--ok:#4ade80;--text-faint:rgba(255,255,255,0.4);--purple-light:#c8a8e9;}
body{font-family:'DM Sans',sans-serif;background:var(--p1);color:var(--w);font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,0.8);}}
.orb{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(107,63,160,0.25) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.04);border:0.5px solid rgba(200,168,233,0.2);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-style:italic;color:var(--al);text-align:center;margin-bottom:0.5rem;}
.title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--w);text-align:center;margin-bottom:0.4rem;}
.subtitle{font-size:0.85rem;color:var(--wm);text-align:center;margin-bottom:2rem;font-weight:300;}
.field{margin-bottom:1rem;}
.field label{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ws);display:block;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(200,168,233,0.25);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--w);outline:none;transition:border-color 0.2s;}
.field input::placeholder{color:var(--ws);}
.field input:focus{border-color:rgba(200,168,233,0.6);}
.forgot{font-size:0.75rem;color:var(--al);text-decoration:none;display:block;text-align:right;margin-bottom:1rem;cursor:pointer;}
.btn{width:100%;padding:14px;background:var(--a);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
.btn:hover{background:#b07fd4;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:12px;margin:1.2rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(200,168,233,0.2);}
.divider span{font-size:0.75rem;color:var(--ws);}
.signup-link{text-align:center;font-size:0.85rem;color:var(--wm);}
.signup-link a{color:var(--al);text-decoration:none;font-weight:500;}
.msg-box{padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:none;}
.msg-box.error-msg{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--err);}
.msg-box.ok-msg{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--ok);}
.legal-footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:11px;color:var(--text-faint);}
.legal-footer a{color:var(--purple-light);text-decoration:none;}
.legal-footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb"></div>
<div class="card">
  <div class="logo">QuickGigs</div>
  <h1 class="title">Welcome back</h1>
  <p class="subtitle">Log in to your QuickGigs account</p>

  <div class="msg-box error-msg" id="errorMsg"></div>
  <div class="msg-box ok-msg" id="okMsg"></div>

  <form id="loginForm">
    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" required>
    </div>
    <span class="forgot" id="forgotLink">Forgot password?</span>
    <button type="submit" class="btn" id="submitBtn">Log in</button>
  </form>

  <div class="divider"><span>or</span></div>
  <div class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
</div>

<script src="qg-utils.js"></script>
<script src="qg-config.js"></script>
<script src="supabase-db.js"></script>
<script src="qg-stats.js"></script>
<script>
attachPasswordToggle('password');
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbYJxU-3r7qVMqwzXHiC-qRkZNtmGobm0",
  authDomain: "quickgigs-7b12d.firebaseapp.com",
  projectId: "quickgigs-7b12d",
  storageBucket: "quickgigs-7b12d.firebasestorage.app",
  messagingSenderId: "698985399366",
  appId: "1:698985399366:web:8a3ca60c5f3ffac84bb647",
  measurementId: "G-82SPKK654N"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

var stars=document.getElementById('stars');
for(var i=0;i<80;i++){var s=document.createElement('div');s.className='star';var size=Math.random()*2+0.5;s.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(Math.random()*4+2)+'s;--op:'+(Math.random()*0.6+0.1)+';animation-delay:'+Math.random()*5+'s';stars.appendChild(s);}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errorMsg = document.getElementById('errorMsg');
  var okMsg = document.getElementById('okMsg');
  var submitBtn = document.getElementById('submitBtn');
  errorMsg.style.display = 'none';
  okMsg.style.display = 'none';

  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  submitBtn.textContent = 'Logging in...';
  submitBtn.disabled = true;

  try {
    var cred = await signInWithEmailAndPassword(auth, email, password);
    if (typeof syncCurrentUserProfile === 'function') {
      await syncCurrentUserProfile(cred.user);
    }
    if (typeof getUserByFirebaseUid === 'function') {
      var dbUser = await getUserByFirebaseUid(cred.user.uid);
      if (dbUser && dbUser.role) localStorage.setItem('qg-role', dbUser.role);
    }
    if (typeof enforceBanOnLogin === 'function') {
      var banCheck = await enforceBanOnLogin(cred.user);
      if (!banCheck.ok) {
        submitBtn.textContent = 'Log in';
        submitBtn.disabled = false;
        return;
      }
    }
    okMsg.textContent = 'Welcome back! Redirecting...';
    okMsg.style.display = 'block';
    var dest = typeof getDashboardUrl === 'function' ? getDashboardUrl() : 'dashboard.html';
    setTimeout(function(){ window.location.href = dest; }, 1200);
  } catch (error) {
    var message = 'Invalid email or password. Please try again.';
    if(error.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
    if(error.code === 'auth/user-not-found') message = 'No account found with this email. Sign up first!';
    if(error.code === 'auth/wrong-password') message = 'Incorrect password. Try again.';
    if(error.code === 'auth/invalid-credential') message = 'Invalid email or password. Please try again.';
    errorMsg.textContent = message;
    errorMsg.style.display = 'block';
    submitBtn.textContent = 'Log in';
    submitBtn.disabled = false;
  }
});

document.getElementById('forgotLink').addEventListener('click', async function() {
  var email = document.getElementById('email').value;
  var errorMsg = document.getElementById('errorMsg');
  var okMsg = document.getElementById('okMsg');
  errorMsg.style.display = 'none';
  okMsg.style.display = 'none';

  if(!email) {
    errorMsg.textContent = 'Enter your email above first, then click forgot password.';
    errorMsg.style.display = 'block';
    return;
  }
  try {
    var resetUrl = window.location.origin + '/reset-password.html';
    await sendPasswordResetEmail(auth, email, {
      url: resetUrl,
      handleCodeInApp: true
    });
    okMsg.textContent = 'Password reset email sent! Check your inbox (and spam). The link opens a QuickGigs page — if Yahoo blocks links, tap Show images / Not spam first.';
    okMsg.style.display = 'block';
  } catch (error) {
    errorMsg.textContent = 'Could not send reset email. Check the address and try again.';
    errorMsg.style.display = 'block';
  }
});
</script>
<footer class="legal-footer site-footer" id="siteFooter">
  <a href="terms.html">Terms of Service</a> · <a href="privacy.html">Privacy Policy</a>
</footer>
<script src="qg-cookies.js"></script>
<script src="qg-site.js"></script>
</body>
</html>
