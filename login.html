<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QuickGigs — Log In · Canada</title>
<meta name="description" content="Log in to QuickGigs — Canada's marketplace for everyday tasks and gigs, available nationwide.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://quickgigs-7b12d.firebaseapp.com">
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="stylesheet" href="qg-signup.css?v=4">
<link rel="stylesheet" href="qg-cookies.css">
<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#0a0118;color:#fff;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,0.8);}}
</style>
</head>
<body>
<div class="signup-bg-mesh"></div>
<div class="signup-orb signup-orb-1"></div>
<div class="signup-orb signup-orb-2"></div>
<div class="stars" id="stars"></div>

<div class="signup-page">
  <div class="signup-card-wrap">
    <div class="signup-card">
      <div class="signup-top-row">
        <div class="signup-logo">QuickGigs</div>
        <button type="button" class="signup-theme-btn" id="authThemeBtn" onclick="toggleAuthTheme()">☀️ Light</button>
      </div>

      <div class="signup-step-icon" aria-hidden="true">👋</div>
      <h1 class="signup-title">Welcome back</h1>
      <p class="signup-subtitle">Log in to post tasks, apply to gigs, and manage your account</p>

      <div class="signup-perks">
        <div class="signup-perk"><span>🇨🇦</span> Canada-wide marketplace</div>
        <div class="signup-perk"><span>🔒</span> Secure Firebase login</div>
        <div class="signup-perk"><span>⚡</span> Pick up where you left off</div>
      </div>

      <div class="signup-msg error" id="errorMsg"></div>
      <div class="signup-msg ok" id="okMsg"></div>

      <form id="loginForm">
        <div class="signup-field">
          <label>Email address <span class="req">*</span></label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="signup-field">
          <label>Password <span class="req">*</span></label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
        </div>
        <button type="button" class="signup-forgot" id="forgotLink">Forgot password?</button>
        <button type="submit" class="signup-btn" id="submitBtn">Log in →</button>
      </form>

      <div class="signup-trust">
        <span>🔒 Encrypted</span>
        <span>🇨🇦 PIPEDA compliant</span>
        <span>✓ Beta access</span>
      </div>

      <div class="signup-divider"><span>or</span></div>
      <div class="signup-login">Don't have an account? <a href="signup.html">Sign up free</a></div>

      <div class="signup-auth-links">
        <a href="how-it-works.html">How it works</a> ·
        <a href="faq.html">FAQ</a> ·
        <a href="terms.html">Terms</a> ·
        <a href="privacy.html">Privacy</a>
      </div>
    </div>
  </div>
</div>

<script src="qg-utils.js"></script>
<script src="qg-cookies.js"></script>
<script>
attachPasswordToggle('password');

var authDark = localStorage.getItem('qg-mode') !== 'light';
function applyAuthTheme() {
  document.body.classList.toggle('light', !authDark);
  var btn = document.getElementById('authThemeBtn');
  if (btn) btn.textContent = authDark ? '☀️ Light' : '🌙 Dark';
}
window.toggleAuthTheme = function() {
  authDark = !authDark;
  localStorage.setItem('qg-mode', authDark ? 'dark' : 'light');
  applyAuthTheme();
};
applyAuthTheme();

var stars = document.getElementById('stars');
var starCount = window.matchMedia('(max-width:768px)').matches ? 30 : 60;
for (var i = 0; i < starCount; i++) {
  var s = document.createElement('div');
  s.className = 'star';
  var size = Math.random() * 2 + 0.5;
  s.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + Math.random() * 100 + '%;top:' + Math.random() * 100 + '%;--d:' + (Math.random() * 4 + 2) + 's;--op:' + (Math.random() * 0.6 + 0.1) + ';animation-delay:' + Math.random() * 5 + 's';
  stars.appendChild(s);
}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbYJxU-3r7qVMqwzXHiC-qRkZNtmGobm0",
  authDomain: "quickgigs-7b12d.firebaseapp.com",
  projectId: "quickgigs-7b12d",
  storageBucket: "quickgigs-7b12d.firebasestorage.app",
  messagingSenderId: "698985399366",
  appId: "1:698985399366:web:8a3ca60c5f3ffac84bb647",
  measurementId: "G-82SPKK654N"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errorMsg = document.getElementById('errorMsg');
  var okMsg = document.getElementById('okMsg');
  var submitBtn = document.getElementById('submitBtn');
  errorMsg.style.display = 'none';
  okMsg.style.display = 'none';

  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  submitBtn.textContent = 'Logging in…';
  submitBtn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    submitBtn.textContent = 'Opening dashboard…';
    var dest = typeof getDashboardUrl === 'function'
      ? getDashboardUrl()
      : ('dashboard.html?mode=' + (localStorage.getItem('qg-session-mode') || localStorage.getItem('qg-role') || 'poster'));
    window.location.replace(dest);
  } catch (error) {
    var message = 'Invalid email or password. Please try again.';
    if (error.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
    if (error.code === 'auth/user-not-found') message = 'No account found with this email. Sign up first!';
    if (error.code === 'auth/wrong-password') message = 'Incorrect password. Try again.';
    if (error.code === 'auth/invalid-credential') message = 'Invalid email or password. Please try again.';
    errorMsg.textContent = message;
    errorMsg.style.display = 'block';
    submitBtn.textContent = 'Log in →';
    submitBtn.disabled = false;
  }
});

document.getElementById('forgotLink').addEventListener('click', async function() {
  var email = document.getElementById('email').value.trim();
  var errorMsg = document.getElementById('errorMsg');
  var okMsg = document.getElementById('okMsg');
  errorMsg.style.display = 'none';
  okMsg.style.display = 'none';

  if (!email) {
    errorMsg.textContent = 'Enter your email above first, then click Forgot password.';
    errorMsg.style.display = 'block';
    return;
  }
  try {
    var resetUrl = window.location.origin + '/reset-password.html';
    await sendPasswordResetEmail(auth, email, {
      url: resetUrl,
      handleCodeInApp: true
    });
    okMsg.textContent = 'Password reset email sent! Check your inbox (and spam).';
    okMsg.style.display = 'block';
  } catch (error) {
    errorMsg.textContent = 'Could not send reset email. Check the address and try again.';
    errorMsg.style.display = 'block';
  }
});
</script>
</body>
</html>
