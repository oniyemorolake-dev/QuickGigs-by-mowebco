<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickGigs — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p1:#0d0520;--a:#9b6fc4;--al:#c8a8e9;--w:#ffffff;--wm:rgba(255,255,255,0.7);--ws:rgba(255,255,255,0.4);--err:#ff6b6b;--ok:#4ade80;}
body{font-family:'DM Sans',sans-serif;background:var(--p1);color:var(--w);font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,0.8);}}
.orb{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(107,63,160,0.25) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.04);border:0.5px solid rgba(200,168,233,0.2);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-style:italic;color:var(--al);text-align:center;margin-bottom:0.5rem;}
.title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--w);text-align:center;margin-bottom:0.4rem;}
.subtitle{font-size:0.85rem;color:var(--wm);text-align:center;margin-bottom:2rem;font-weight:300;}
.role-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem;}
.role-btn{padding:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(200,168,233,0.2);border-radius:10px;color:var(--wm);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.role-btn.active{background:rgba(107,63,160,0.3);border-color:var(--a);color:var(--w);}
.role-icon{font-size:1.4rem;display:block;margin-bottom:4px;}
.field{margin-bottom:1rem;}
.field label{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ws);display:block;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(200,168,233,0.25);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--w);outline:none;transition:border-color 0.2s;}
.field input::placeholder{color:var(--ws);}
.field input:focus{border-color:rgba(200,168,233,0.6);}
.btn{width:100%;padding:14px;background:var(--a);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
.btn:hover{background:#b07fd4;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:12px;margin:1.2rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(200,168,233,0.2);}
.divider span{font-size:0.75rem;color:var(--ws);}
.login-link{text-align:center;font-size:0.85rem;color:var(--wm);}
.login-link a{color:var(--al);text-decoration:none;font-weight:500;}
.terms{font-size:0.75rem;color:var(--ws);text-align:center;margin-top:1rem;line-height:1.6;}
.terms a{color:var(--al);text-decoration:none;}
.terms-check{display:flex;align-items:flex-start;gap:10px;margin-top:1rem;text-align:left;}
.terms-check input{margin-top:3px;accent-color:var(--a);}
.terms-check label{font-size:0.75rem;color:var(--wm);line-height:1.5;cursor:pointer;}
.error{font-size:0.75rem;color:var(--err);margin-top:4px;display:none;}
.msg-box{padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:none;}
.msg-box.error-msg{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--err);}
.msg-box.ok-msg{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--ok);}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb"></div>
<div class="card">
  <div class="logo">QuickGigs</div>
  <h1 class="title">Create your account</h1>
  <p class="subtitle">Join thousands of Canadians getting things done</p>

  <div class="msg-box error-msg" id="errorMsg"></div>
  <div class="msg-box ok-msg" id="okMsg"></div>

  <div class="role-wrap">
    <button type="button" class="role-btn active" onclick="setRole('poster',this)">
      <span class="role-icon">📋</span>I need help
    </button>
    <button type="button" class="role-btn" onclick="setRole('worker',this)">
      <span class="role-icon">💰</span>I want to earn
    </button>
  </div>

  <form id="signupForm">
    <input type="hidden" id="roleInput" value="poster">
    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Your full name" required>
      <div class="error" id="nameError">Please enter your full name</div>
    </div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
      <div class="error" id="emailError">Please enter a valid email address</div>
    </div>
    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="phone" placeholder="+1 (403) 000-0000">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required>
      <div class="error" id="passwordError">Password must be at least 8 characters</div>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
      <div class="error" id="confirmError">Passwords do not match</div>
    </div>
    <div class="terms-check">
      <input type="checkbox" id="termsAgree" required>
      <label for="termsAgree">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
    </div>
    <button type="submit" class="btn" id="submitBtn">Create account</button>
  </form>

  <div class="divider"><span>or</span></div>
  <div class="login-link">Already have an account? <a href="login.html">Log in</a></div>
</div>

<script src="qg-utils.js"></script>
<script src="supabase-db.js"></script>
<script>
attachPasswordToggle('password');
attachPasswordToggle('confirmPassword');
attachNameFormatter('name');
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbYJxU-3r7qVMqwzXHiC-qRkZNtmGobm0",
  authDomain: "quickgigs-7b12d.firebaseapp.com",
  projectId: "quickgigs-7b12d",
  storageBucket: "quickgigs-7b12d.firebasestorage.app",
  messagingSenderId: "698985399366",
  appId: "1:698985399366:web:8a3ca60c5f3ffac84bb647"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Stars
var stars = document.getElementById('stars');
for(var i = 0; i < 80; i++){
  var s = document.createElement('div');
  s.className = 'star';
  var size = Math.random() * 2 + 0.5;
  s.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(Math.random()*4+2)+'s;--op:'+(Math.random()*0.6+0.1)+';animation-delay:'+Math.random()*5+'s';
  stars.appendChild(s);
}

// Role selection
window.setRole = function(role, btn) {
  document.querySelectorAll('.role-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('roleInput').value = role;
};

(function applySignupRoleFromUrl() {
  var roleParam = new URLSearchParams(window.location.search).get('role');
  if (roleParam === 'worker') {
    var workerBtn = document.querySelector('.role-btn[onclick*="worker"]');
    if (workerBtn) setRole('worker', workerBtn);
  }
})();

// Form submit
document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  var errorMsg  = document.getElementById('errorMsg');
  var okMsg     = document.getElementById('okMsg');
  var submitBtn = document.getElementById('submitBtn');
  errorMsg.style.display = 'none';
  okMsg.style.display    = 'none';
  document.querySelectorAll('.error').forEach(function(el){ el.style.display = 'none'; });

  var name    = typeof formatPersonName === 'function'
    ? formatPersonName(window.sanitizeInput(document.getElementById('name').value, 80))
    : window.sanitizeInput(document.getElementById('name').value, 80);
  var email   = document.getElementById('email').value.trim();
  var phone   = window.sanitizeInput(document.getElementById('phone').value, 20);
  var password= document.getElementById('password').value;
  var confirm = document.getElementById('confirmPassword').value;
  var role    = document.getElementById('roleInput').value;

  // Validate
  var valid = true;
  if (name.length < 2)        { document.getElementById('nameError').style.display     = 'block'; valid = false; }
  if (password.length < 8)    { document.getElementById('passwordError').style.display = 'block'; valid = false; }
  if (password !== confirm)   { document.getElementById('confirmError').style.display  = 'block'; valid = false; }
  if (!document.getElementById('termsAgree').checked) {
    errorMsg.textContent = 'Please agree to the Terms of Service and Privacy Policy.';
    errorMsg.style.display = 'block';
    valid = false;
  }
  if (!valid) return;

  submitBtn.textContent = 'Creating account...';
  submitBtn.disabled    = true;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCredential.user, { displayName: name });

    var saveResult = await saveUser({ name, email, phone, role, firebase_uid: userCredential.user.uid });
    if (!saveResult.success) console.warn('Could not save user to Supabase:', saveResult.error);

    localStorage.setItem('qg-role', role);
    localStorage.setItem('qg-session-mode', role === 'worker' ? 'worker' : 'poster');

    okMsg.textContent = 'Account created! Welcome to QuickGigs 🎉 Redirecting...';
    okMsg.style.display = 'block';
    var dest = typeof getDashboardUrl === 'function' ? getDashboardUrl(role) : ('dashboard.html?mode=' + (role === 'worker' ? 'worker' : 'poster'));
    setTimeout(function(){ window.location.href = dest; }, 1500);

  } catch (error) {
    var message = 'Something went wrong. Please try again.';
    if (error.code === 'auth/email-already-in-use') message = 'This email is already registered. Try logging in.';
    if (error.code === 'auth/invalid-email')        message = 'Please enter a valid email address.';
    if (error.code === 'auth/weak-password')        message = 'Password is too weak. Use at least 8 characters.';
    errorMsg.textContent   = message;
    errorMsg.style.display = 'block';
    submitBtn.textContent  = 'Create account';
    submitBtn.disabled     = false;
  }
});
</script>
</body>
</html>
