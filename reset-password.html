<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QuickGigs — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p1:#0d0520;--a:#9b6fc4;--al:#c8a8e9;--w:#fff;--wm:rgba(255,255,255,0.7);--ws:rgba(255,255,255,0.4);--err:#ff6b6b;--ok:#4ade80;}
body{font-family:'DM Sans',sans-serif;background:var(--p1);color:var(--w);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(200,168,233,0.2);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-style:italic;color:var(--al);text-align:center;margin-bottom:0.5rem;}
.title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.5rem;}
.sub{font-size:0.85rem;color:var(--wm);text-align:center;line-height:1.6;margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ws);display:block;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(200,168,233,0.25);border-radius:10px;font-family:inherit;font-size:0.9rem;color:var(--w);outline:none;}
.btn{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:500;cursor:pointer;margin-top:0.5rem;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:none;line-height:1.5;}
.msg.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--err);}
.msg.ok{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--ok);}
.back{display:block;text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--al);text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">QuickGigs</div>
  <h1 class="title">Set a new password</h1>
  <p class="sub" id="pageSub">Choose a strong password for your QuickGigs account.</p>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg ok" id="okMsg"></div>
  <form id="resetForm">
    <div class="field">
      <label>New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" required minlength="8">
    </div>
    <button type="submit" class="btn" id="submitBtn">Update password</button>
  </form>
  <a class="back" href="login.html">← Back to log in</a>
</div>

<script src="qg-utils.js"></script>
<script>
attachPasswordToggle('password');
attachPasswordToggle('confirmPassword');
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbYJxU-3r7qVMqwzXHiC-qRkZNtmGobm0",
  authDomain: "quickgigs-7b12d.firebaseapp.com",
  projectId: "quickgigs-7b12d",
  storageBucket: "quickgigs-7b12d.firebasestorage.app",
  messagingSenderId: "698985399366",
  appId: "1:698985399366:web:8a3ca60c5f3ffac84bb647"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode');
const oobCode = params.get('oobCode');

const errorMsg = document.getElementById('errorMsg');
const okMsg = document.getElementById('okMsg');
const form = document.getElementById('resetForm');
const submitBtn = document.getElementById('submitBtn');

function showError(text) {
  errorMsg.textContent = text;
  errorMsg.style.display = 'block';
  okMsg.style.display = 'none';
}

function showOk(text) {
  okMsg.textContent = text;
  okMsg.style.display = 'block';
  errorMsg.style.display = 'none';
}

if (!oobCode || mode !== 'resetPassword') {
  showError('This reset link is invalid or has expired. Request a new one from the log in page.');
  form.style.display = 'none';
  submitBtn.disabled = true;
} else {
  verifyPasswordResetCode(auth, oobCode).then(function(email) {
    document.getElementById('pageSub').textContent = 'Reset password for ' + email;
  }).catch(function() {
    showError('This reset link is invalid or has expired. Request a new one from the log in page.');
    form.style.display = 'none';
  });
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  errorMsg.style.display = 'none';
  okMsg.style.display = 'none';

  var password = document.getElementById('password').value;
  var confirm = document.getElementById('confirmPassword').value;
  if (password.length < 8) {
    showError('Password must be at least 8 characters.');
    return;
  }
  if (password !== confirm) {
    showError('Passwords do not match.');
    return;
  }

  submitBtn.textContent = 'Updating...';
  submitBtn.disabled = true;

  try {
    await confirmPasswordReset(auth, oobCode, password);
    showOk('Password updated! Redirecting to log in...');
    form.style.display = 'none';
    setTimeout(function() { window.location.href = 'login.html'; }, 2000);
  } catch (err) {
    showError('Could not reset password. The link may have expired — request a new one.');
    submitBtn.textContent = 'Update password';
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
